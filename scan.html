<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สแกนเข้างาน - THAISIAM INKJET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .logo-spin { animation: spin360 12s linear infinite; transform-style: preserve-3d; width: 80px; height: 80px; }
        @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .camera-box { position: relative; width: 100%; max-width: 450px; aspect-ratio: 3/4; border-radius: 30px; overflow: hidden; background: #1e293b; border: 4px solid #334155; margin: 0 auto; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .glass-ui { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #6366f1; top: 0; left: 0; box-shadow: 0 0 15px #6366f1; animation: scanMove 3s ease-in-out infinite; pointer-events: none; }
        @keyframes scanMove { 0%, 100% { top: 5%; } 50% { top: 95%; } }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <!-- Header & Logo -->
    <div class="flex flex-col items-center mb-6 mt-4">
        <div class="logo-wrapper mb-2">
            <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" alt="Logo" class="logo-spin">
        </div>
        <h1 class="text-2xl font-bold text-blue-400">THAISIAM INKJET</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500">Attendance System v2.0</p>
    </div>

    <!-- Camera Display -->
    <div class="w-full max-w-md space-y-4">
        <div id="status-chip" class="mx-auto px-4 py-1.5 bg-slate-800 rounded-full text-sm font-medium text-indigo-300 w-fit border border-indigo-500/30">
            กำลังโหลดระบบ...
        </div>

        <div class="camera-box shadow-2xl shadow-indigo-500/10">
            <video id="video" autoplay muted playsinline></video>
            <div id="scanner-line" class="scan-line hidden"></div>
            <!-- Face Frame Overlay -->
            <div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none">
                <div class="w-64 h-80 border-2 border-dashed border-white/50 rounded-[40px]"></div>
            </div>
        </div>

        <!-- Selection Controls -->
        <div class="glass-ui p-5 rounded-[2rem] space-y-4 shadow-xl border border-white/5">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 ml-2">ประเภท</label>
                    <select id="typeSelect" class="w-full bg-slate-900/50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="IN">เข้างาน (IN)</option>
                        <option value="OUT">ออกงาน (OUT)</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-slate-400 ml-2">สถานที่</label>
                    <select id="locationSelect" class="w-full bg-slate-900/50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="">-- เลือกสถานที่ --</option>
                    </select>
                </div>
            </div>

            <button id="btnStart" onclick="startSystem()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-600/30 active:scale-95 transition-all flex items-center justify-center gap-2">
                <i data-lucide="scan"></i> เริ่มสแกนใบหน้า
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const video = document.getElementById("video");
        const statusChip = document.getElementById("status-chip");
        const btnStart = document.getElementById("btnStart");
        const scanLine = document.getElementById("scanner-line");

        let knownFaces = [];
        let locationsData = [];
        let isProcessing = false;
        let scanInterval = null;
        const MATCH_THRESHOLD = 0.45; // ปรับให้เหมาะกับ 5 มุม (ถ้าน้อยกว่านี้คือเหมือนมาก)

        // Init AI & Data
        window.onload = async () => {
            try {
                const MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                
                // โหลดข้อมูลผ่าน google.script.run (รวดเร็วกว่า fetch)
                google.script.run.withSuccessHandler(data => {
                    knownFaces = data.map(u => ({
                        id: u.studentId,
                        name: u.name,
                        dept: u.department,
                        // u.descriptor ตอนนี้จะเป็น Array ของ 5 ชุดใบหน้า
                        descriptors: u.descriptors.map(d => new Float32Array(d))
                    }));
                    statusChip.innerText = "พร้อมใช้งาน";
                }).getFaceDatabase();

                google.script.run.withSuccessHandler(data => {
                    locationsData = data;
                    const select = document.getElementById("locationSelect");
                    data.forEach(loc => {
                        const opt = new Option(loc.name, loc.name);
                        select.add(opt);
                    });
                }).getLocations();

            } catch (e) {
                statusChip.innerText = "❌ AI Error";
                console.error(e);
            }
        };

        function startSystem() {
            if (!document.getElementById("locationSelect").value) {
                return Swal.fire('ลืมเลือกสถานที่!', 'กรุณาเลือกสถานที่ปฏิบัติงานก่อนสแกน', 'warning');
            }
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    scanLine.classList.remove('hidden');
                    btnStart.style.display = 'none';
                    statusChip.innerText = "📸 วางใบหน้าในกรอบ...";
                    startScanLoop();
                })
                .catch(err => {
                    Swal.fire('กล้องขัดข้อง', 'โปรดอนุญาตให้เข้าถึงกล้อง', 'error');
                });
        }

        function startScanLoop() {
            scanInterval = setInterval(async () => {
                if (isProcessing) return;

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detection) {
                    const bestMatch = findBestMatchInPool(detection.descriptor);
                    
                    if (bestMatch && bestMatch.distance < MATCH_THRESHOLD) {
                        isProcessing = true;
                        clearInterval(scanInterval);
                        processSuccess(bestMatch);
                    }
                }
            }, 500);
        }

        // 🧠 ระบบโหวตใบหน้า 5 มุม (Multi-Angle Voting)
        function findBestMatchInPool(queryDescriptor) {
            let bestOverall = null;

            knownFaces.forEach(person => {
                // เทียบใบหน้าที่กล้องเห็น กับ "ทุกมุม" ของพนักงานคนนั้นๆ
                person.descriptors.forEach(desc => {
                    const distance = faceapi.euclideanDistance(queryDescriptor, desc);
                    if (!bestOverall || distance < bestOverall.distance) {
                        bestOverall = { 
                            id: person.id, 
                            name: person.name, 
                            dept: person.dept, 
                            distance: distance 
                        };
                    }
                });
            });
            return bestOverall;
        }

        async function processSuccess(user) {
            statusChip.innerText = "🎯 พบข้อมูล: " + user.name;
            
            // ถ่ายภาพพนักงาน ณ ตอนที่สแกนติด
            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
            const imageBase64 = canvas.toDataURL('image/jpeg', 0.6);

            // เช็ค GPS
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const type = document.getElementById("typeSelect").value;
                const locName = document.getElementById("locationSelect").value;
                
                const payload = {
                    action: "attendance",
                    studentId: user.id,
                    name: user.name,
                    department: user.dept,
                    type: type,
                    locationName: locName,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    image: imageBase64
                };

                statusChip.innerText = "⏳ กำลังส่งข้อมูล...";

                google.script.run.withSuccessHandler(res => {
                    if (res.success) {
                        Swal.fire({
                            title: 'บันทึกสำเร็จ!',
                            text: `สวัสดีครับคุณ ${user.name}`,
                            icon: 'success',
                            timer: 2000,
                            showConfirmButton: false
                        }).then(() => {
                            window.location.reload();
                        });
                    } else {
                        Swal.fire('ผิดพลาด', res.message, 'error').then(() => resetScan());
                    }
                }).processAttendance(payload);

            }, (err) => {
                Swal.fire('GPS ขัดข้อง', 'กรุณาเปิด GPS และอนุญาตการเข้าถึง', 'error').then(() => resetScan());
            });
        }

        function resetScan() {
            isProcessing = false;
            statusChip.innerText = "📸 วางใบหน้าในกรอบ...";
            startScanLoop();
        }
    </script>
</body>
</html>
