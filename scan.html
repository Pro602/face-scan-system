<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
  /* --- เพิ่มส่วนแอนิเมชัน Logo --- */
  .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; margin-bottom: 10px; }
  .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; width: 70px; height: 70px; object-fit: contain; }
  @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
  
  .brand-name { color: #60a5fa; font-weight: bold; font-size: 20px; margin: 5px 0 0 0; }
  .brand-subtitle { color: #64748b; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; }
  /* -------------------------- */
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);

  /* ช่วยภาพสว่างขึ้นบนมือถือ */
  filter: brightness(1.15) contrast(1.05);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; font-size:18px; }
</style>
</head>

<body>

  <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
    <div class="logo-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" alt="Logo" class="logo-spin">
    </div>
    <h1 class="brand-name">THAISIAM INKJET</h1>
    <p class="brand-subtitle">Professional Attendance Recording Systems</p>
  </div>

  <div id="status">กำลังโหลดระบบ...</div>

  <video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- เลือกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>
 <button onclick="playSound('IN')">ทดสอบเสียง</button>

<!-- 🔥 ใช้แทนไฟล์เดิมได้เลย -->
<script>

// ================= CONFIG =================
// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

const video = document.getElementById("video")
const status = document.getElementById("status")

// ================= AUDIO =================
// ================= AUDIO (FIX ANDROID/iOS) =================
let audioReady = false

const audioMap = {
  IN: new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3"),
  OUT: new Audio("https://www.soundjay.com/buttons/sounds/button-4.mp3"),
  ERROR: new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3")
}

// 🔥 preload
Object.values(audioMap).forEach(a=>{
  a.preload = "auto"
})

// 🔥 unlock
function unlockAudio(){

  const testAudio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")

  testAudio.play().then(()=>{
    audioReady = true
    console.log("🔊 audio unlocked")
  }).catch(()=>{
    console.log("❌ audio blocked")
  })
}

// 🔥 play
function playSound(type){

  if(!audioReady) return

  const audio = audioMap[type] || audioMap["ERROR"]

  audio.currentTime = 0
  audio.play().catch(()=>{})
}

// 🔥 speak
function speak(text){

  try{
    const msg = new SpeechSynthesisUtterance(text)
    msg.lang = "th-TH"
    speechSynthesis.speak(msg)
  }catch(e){}
}

let knownFaces = []
let locationsData = []
let scanInterval = null
let isProcessing = false
let capturedImage = null
let needRestart = false   // 🔥 ตัวนี้สำคัญ
let alreadyConfirmed = false
let confirmLock = false

// 🔥 adaptive speed
const SCAN_DELAY = /iPhone|iPad|iPod/.test(navigator.userAgent) ? 320 : 240

// 🔥 strict threshold
const MATCH_THRESHOLD = 0.45

// 🔥 movement
let movementHistory = []

// ================= INIT =================
window.onload = init

async function init(){

  const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaceDatabase()
  await loadLocations()

  status.innerText = "พร้อมใช้งาน"
}

// ================= START =================
function startAll(){
  needRestart = false

  unlockAudio()   // ✅ ต้องอยู่ใน onclick เท่านั้น

  startCamera()
}
// ================= LOAD FACE =================
async function loadFaceDatabase(){

  const res = await fetch(API_URL + "?action=faces&t=" + Date.now())
  const data = await res.json()

  knownFaces = data.map(u => ({
    studentId: u.studentId,
    name: u.name,
    class: u.department,
    descriptor: new Float32Array(u.descriptor)
  }))
}

// ================= LOAD LOCATION =================
async function loadLocations(){

  const res = await fetch(API_URL + "?action=locations")
  const data = await res.json()

  locationsData = data

  const select = document.getElementById("locationSelect")

  data.forEach(loc=>{
    const opt = document.createElement("option")
    opt.value = loc.name
    opt.textContent = loc.name
    select.appendChild(opt)
  })
}

// ================= CAMERA =================
function startCamera(){

navigator.mediaDevices.getUserMedia({
  video:{
    facingMode:"user",
    width:{ ideal:320 },
    height:{ ideal:240 }
  }
})
.then(stream=>{
  video.srcObject = stream
  video.onloadedmetadata = ()=>{
    video.play()
    startScanLoop()
  }
})
.catch(()=>{
  alert("❌ เปิดกล้องไม่ได้")
})
}

// ================= SCAN =================
function startScanLoop(){

  if(scanInterval) clearInterval(scanInterval)

  scanInterval = setInterval(async()=>{
   if(needRestart) return   // 🔥 กันยิงซ้ำ
    if(isProcessing) return
    if(video.readyState !== 4) return

    try{

      status.innerText = "📸 มองกล้องและขยับเล็กน้อย"

      const det = await faceapi
        .detectSingleFace(
          video,
          new faceapi.TinyFaceDetectorOptions({
            inputSize:160,
            scoreThreshold:0.5
          })
        )
        .withFaceLandmarks()
        .withFaceDescriptor()

      if(!det) return

      const box = det.detection.box

      if(box.width < 90 || box.width > 300) return
      if(det.detection.score < 0.6) return

      if(!detectMovement(det.landmarks)) return

      const best = findBestMatch(det.descriptor)

      if(best && best.distance < MATCH_THRESHOLD){
      if(alreadyConfirmed) return   // 🔥 กันซ้ำ

      alreadyConfirmed = true       // 🔥 ล็อกทันที

// 🔥 จับภาพทันทีตอนสแกนผ่าน
capturedImage = captureImage()

isProcessing = true
clearInterval(scanInterval)

// เว้นจังหวะให้เหมือนระบบเดิม
setTimeout(async()=>{
  await confirmAttendance(best)
},300)

return
      }

    }catch(e){
      console.error(e)
    }

  }, SCAN_DELAY)
}

// ================= MOVEMENT =================
function detectMovement(landmarks){

  const nose = landmarks.getNose()[3]

  movementHistory.push({x:nose.x,y:nose.y})

  if(movementHistory.length > 5){
    movementHistory.shift()
  }

  if(movementHistory.length < 3){
    return false
  }

  let move = 0

  for(let i=1;i<movementHistory.length;i++){
    move += Math.abs(movementHistory[i].x - movementHistory[i-1].x)
    move += Math.abs(movementHistory[i].y - movementHistory[i-1].y)
  }

  return move > 1.5
}

// ================= MATCH =================
function findBestMatch(query){

  let best = null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)
    if(!best || dist < best.distance){
      best = {...face, distance:dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      }),
      ()=>resolve({lat:"",lng:""})
    )
  })
}

// ================= CONFIRM =================
async function confirmAttendance(user){
  if(confirmLock) return   // 🔥 กัน async ยิงซ้ำ
  confirmLock = true       // 🔥 ล็อกทันที

  const type = document.getElementById("typeSelect").value
  const locationName = document.getElementById("locationSelect").value

  // ❌ ไม่เลือกสถานที่
  if (!locationName) {
    alert("❌ กรุณาเลือกสถานที่")
    confirmLock = false   // 🔥 ต้องมี
    resetScan()
    return
  }

  // 📍 GPS (เพิ่ม delay ให้เหมือนเดิม)
  await new Promise(r=>setTimeout(r,500))

  const gps = await getGPS()

  if (!gps.lat) {
    alert("❌ กรุณาเปิด GPS")
    confirmLock = false   // 🔥 ต้องมี
    resetScan()
    return
  }

  const locationText = gps.lat + "," + gps.lng

  const loc = locationsData.find(l => l.name === locationName)

  // 📏 ตรวจระยะ (เหมือนของเดิมคุณ)
  if (loc) {

    const dist = getDistance(
      gps.lat, gps.lng,
      loc.lat, loc.lng
    )

    const radius = loc.radius || 300

    if (
      locationName !== "ทำงานนอกสถานที่" &&
      dist > radius
    ) {

      // 🔥 ของเดิมคุณ (สำคัญ)
playSound("ERROR")
speak("คุณอยู่นอกพื้นที่")

      alert(
        "❌ คุณอยู่ห่างจาก " +
        locationName +
        " ประมาณ " +
        Math.round(dist) +
        " เมตร"
      )

      resetScan()
      return
    }
  }

  // ❗ confirm (เหมือนเดิม)
  if (!confirm(`ยืนยัน ${type}\n${user.name}`)){
    confirmLock = false   // 🔥 ต้องมี
    resetScan()
    return
  }
      // 🔊 เพิ่มตรงนี้
playSound(type)
setTimeout(()=>{
  if(video.srcObject){
    video.srcObject.getTracks().forEach(t=>t.stop())
  }
}, 100)

  // 🔥 ใช้ภาพที่ capture ตอนสแกน (แก้ bug ภาพผิด)
  if(!capturedImage){
    alert("❌ ไม่สามารถจับภาพได้")
    resetScan()
    return
  }

  const imageBase64 = capturedImage

  status.innerText="⏳ กำลังบันทึกข้อมูล..."

  try{

    // save attendance
    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        action:"attendance",
        studentId:user.studentId,
        name:user.name,
        department:user.class,
        type:type,
        location:locationText,
        locationName:locationName
      })
    })

    // save image
    const params = new URLSearchParams()
    params.append("action","uploadImage")
    params.append("studentId",user.studentId)
    params.append("image",imageBase64)

    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{ "Content-Type":"application/x-www-form-urlencoded" },
      body:params.toString()
    })
    alert("✅ บันทึกสำเร็จ")

    location.reload()

  }catch(err){
    console.error(err)
    alert("❌ เกิดข้อผิดพลาด")
    resetScan()
  }
}

// ================= RESET =================
function resetScan(){

  isProcessing = false
  movementHistory = []
  capturedImage = null

  alreadyConfirmed = false   // 🔥 สำคัญมาก
  confirmLock = false   // 🔥 สำคัญมาก
  needRestart = true

  if(scanInterval){
    clearInterval(scanInterval)
    scanInterval = null
  }

  if(video.srcObject){
    video.srcObject.getTracks().forEach(t=>t.stop())
  }

  status.innerText = "❗ กรุณากดเริ่มสแกนใหม่"
}

// ================= IMAGE =================
function captureImage(){

  const canvas = document.createElement("canvas")
  canvas.width = 320
  canvas.height = 240

  const ctx = canvas.getContext("2d")

  ctx.translate(canvas.width,0)
  ctx.scale(-1,1)

  ctx.drawImage(video,0,0,canvas.width,canvas.height)

  return canvas.toDataURL("image/jpeg",0.5)
}

// ================= DIST =================
function getDistance(lat1,lon1,lat2,lon2){

  const R=6371e3
  const toRad=x=>x*Math.PI/180

  const dLat=toRad(lat2-lat1)
  const dLon=toRad(lon2-lon1)

  const a=Math.sin(dLat/2)**2+
  Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

</script>

</body>
</html>
