<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
  /* --- เพิ่มส่วนแอนิเมชัน Logo --- */
  .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; margin-bottom: 10px; }
  .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; width: 70px; height: 70px; object-fit: contain; }
  @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
  
  .brand-name { color: #60a5fa; font-weight: bold; font-size: 20px; margin: 5px 0 0 0; }
  .brand-subtitle { color: #64748b; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; }
  /* -------------------------- */
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; font-size:18px; }
</style>
</head>

<body>

  <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
    <div class="logo-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" alt="Logo" class="logo-spin">
    </div>
    <h1 class="brand-name">THAISIAM INKJET</h1>
    <p class="brand-subtitle">Professional Attendance Recording Systems</p>
  </div>

  <div id="status">กำลังโหลดระบบ...</div>

  <video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- เลือกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

// ================= VAR =================
const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []
let scanInterval = null
let isProcessing = false

// 🔥 กันรูป
let challenge = ""
let challengePassed = false

const MATCH_THRESHOLD = 0.45

// ================= AUDIO =================
let audioReady = false

function unlockAudio(){
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  audio.play().then(()=>{
    audio.pause()
    audio.currentTime = 0
    audioReady = true
  })
}

function playSound(type){
  if(!audioReady) return

  let url = ""

  if(type==="IN") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else if(type==="OUT") url="https://www.soundjay.com/buttons/sounds/button-4.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"

  new Audio(url).play()
}

function speak(text){
  if(!audioReady) return
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "th-TH"
  speechSynthesis.speak(msg)
}

// ================= INIT =================
window.onload = init

async function init(){

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaceDatabase()
  await loadLocations()

  status.innerText="พร้อมใช้งาน"
}

// ================= START =================
function startAll(){
  unlockAudio()
  generateChallenge()
  startCamera()
}

// ================= RANDOM ACTION =================
function generateChallenge(){
  const actions = ["LEFT","RIGHT"]
  challenge = actions[Math.floor(Math.random()*actions.length)]
  challengePassed = false

  if(challenge==="LEFT"){
    status.innerText="👉 กรุณาหันหน้าไปทางซ้าย"
  }else{
    status.innerText="👉 กรุณาหันหน้าไปทางขวา"
  }
}

// ================= LOAD FACE =================
async function loadFaceDatabase(){
  const res = await fetch(API_URL+"?action=faces&t="+Date.now())
  const data = await res.json()

  knownFaces = data.map(u=>({
    studentId:u.studentId,
    name:u.name,
    class:u.department,
    descriptor:new Float32Array(u.descriptor)
  }))
}

// ================= LOAD LOCATION =================
async function loadLocations(){
  const res = await fetch(API_URL+"?action=locations")
  const data = await res.json()

  locationsData = data

  const select=document.getElementById("locationSelect")

  data.forEach(loc=>{
    const opt=document.createElement("option")
    opt.value=loc.name
    opt.textContent=loc.name
    select.appendChild(opt)
  })
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
    .then(stream=>{
      video.srcObject=stream
      startScanLoop()
    })
}

// ================= SCAN =================
function startScanLoop(){
  if(scanInterval) clearInterval(scanInterval);

  scanInterval = setInterval(async () => {
    // 🛑 หยุดสแกนทันทีถ้ากำลังประมวลผลอยู่ เพื่อไม่ให้เด้งยืนยันซ้ำ
    if (isProcessing) return;

    const detection = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) return;

    // 🔥 การตรวจสอบ Challenge เดิมของคุณ
    const nose = detection.landmarks.getNose();
    const noseX = nose[3].x;
    const faceCenter = detection.detection.box.x + detection.detection.box.width / 2;

    if (!challengePassed) {
      if ((challenge === "LEFT" && noseX < faceCenter - 10) || 
          (challenge === "RIGHT" && noseX > faceCenter + 10)) {
        challengePassed = true;
        status.innerText = "✅ ผ่านการตรวจสอบ";
      }
      return;
    }

    const best = findBestMatch(detection.descriptor);

    if (best && best.distance < MATCH_THRESHOLD) {
      // 🚀 ล็อคสถานะและหยุด Loop ทันที เพื่อป้องกันการกดตกลงซ้ำ
      isProcessing = true; 
      clearInterval(scanInterval); 
      confirmAttendance(best);
    }
  }, 500);
}
  
// ================= MATCH =================
function findBestMatch(query){
  let best=null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)
    if(!best || dist < best.distance){
      best={...face, distance:dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      }),
      ()=>resolve({lat:"",lng:""}),
      {enableHighAccuracy:true,timeout:10000}
    )
  })
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x=>x*Math.PI/180

  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= CONFIRM =================
async function confirmAttendance(user) {
  const type = document.getElementById("typeSelect").value;
  const locationName = document.getElementById("locationSelect").value;

  if (!locationName) {
    alert("❌ กรุณาเลือกสถานที่");
    isProcessing = false; startScanLoop(); return;
  }

  const gps = await getGPS();
  if (!gps.lat) {
    alert("❌ กรุณาเปิด GPS");
    isProcessing = false; startScanLoop(); return;
  }

  const locationText = gps.lat + "," + gps.lng;
  const loc = locationsData.find(l => l.name === locationName);

  if (loc) {
    const dist = getDistance(gps.lat, gps.lng, loc.lat, loc.lng);
    const radius = loc.radius || 300;
    if (locationName !== "ทำงานนอกสถานที่" && dist > radius) {
      playSound("ERROR"); speak("อยู่นอกพื้นที่");
      alert("❌ คุณอยู่ห่างจาก " + locationName + " ประมาณ " + Math.round(dist) + " เมตร");
      isProcessing = false; startScanLoop(); return;
    }
  }

  // สร้าง Key พิเศษเพื่อระบุแถวที่ต้องการบันทึกรูปภาพ
  const uniqueKey = "ID-" + Date.now();

  if (!confirm(`ยืนยัน ${type}\n${user.name}`)) {
    isProcessing = false; startScanLoop(); return;
  }

  status.innerText = "⏳ กำลังบันทึกข้อมูล...";
  const imageBase64 = captureImage();

  try {
    // 🔵 1. บันทึกข้อมูลพนักงานพร้อม Unique Key
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "attendance",
        uniqueKey: uniqueKey, // ส่ง Key นี้ไปที่ Sheets ด้วย
        studentId: user.studentId,
        name: user.name,
        department: user.class,
        type: type,
        location: locationText,
        locationName: locationName
      })
    });

    // ⏱ หน่วงเวลา 2 วินาทีเพื่อให้ Sheets มีเวลาเขียน Row ให้เสร็จก่อนส่งรูป
    await new Promise(resolve => setTimeout(resolve, 2000));

    // 🟢 2. บันทึกรูปภาพโดยใช้ Unique Key อ้างอิงแถวเดิม
    status.innerText = "📸 กำลังบันทึกรูปภาพ...";
    const params = new URLSearchParams();
    params.append("action", "uploadImage");
    params.append("uniqueKey", uniqueKey); // ระบุว่าให้ใส่รูปในแถวที่มี Key ตรงกัน
    params.append("studentId", user.studentId);
    params.append("image", imageBase64);

    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      body: params.toString()
    });

    playSound(type);
    
    Swal.fire({
      title: 'บันทึกสำเร็จ',
      text: 'ระบบบันทึกข้อมูลและรูปภาพเรียบร้อยแล้ว',
      icon: 'success',
      confirmButtonText: 'ตกลง',
      confirmButtonColor: '#6366f1',
      allowOutsideClick: false
    }).then((result) => {
      if (result.isConfirmed) {
        if (window.opener) {
            window.close();
        } else {
            window.location.href = "https://pro602.github.io/Scan/?v=1.1"; 
        }
      }
    });

  } catch (err) {
    console.error(err);
    alert("❌ เกิดข้อผิดพลาดในการบันทึกภาพ");
    isProcessing = false; startScanLoop();
  }
}
  
// ปรับให้ภาพเล็กลงที่สุดเพื่อความชัวร์ (120x90, คุณภาพ 0.1)
function captureImage() {
  const canvas = document.createElement("canvas");
  canvas.width = 320; 
  canvas.height = 240;  
  const ctx = canvas.getContext("2d");

  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  return canvas.toDataURL("image/jpeg", 0.5); 
}
</script>

</body>
</html>
