<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; }
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังโหลดระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- นอกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : "")

if(!API_URL){
  alert("❌ ยังไม่ได้ตั้งค่า API")
}

// ================= VAR =================
const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []
let scanInterval = null
let isProcessing = false

const MATCH_THRESHOLD = 0.45

// 🔊 AUDIO
let audioReady = false

function unlockAudio(){
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  audio.play().then(()=>{
    audio.pause()
    audio.currentTime = 0
    audioReady = true
  }).catch(()=>{})
}

function playSound(type){
  if(!audioReady) return

  let url = ""

  if(type==="IN") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else if(type==="OUT") url="https://www.soundjay.com/buttons/sounds/button-4.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"

  new Audio(url).play().catch(()=>{})
}

function speak(text){
  if(!audioReady) return

  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "th-TH"
  speechSynthesis.speak(msg)
}

// ================= INIT =================
window.onload = init

async function init(){
  try{

    status.innerText="โหลด AI..."

    const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ])

    status.innerText="โหลดข้อมูล..."

    await loadFaceDatabase()
    await loadLocations()

    status.innerText="พร้อมใช้งาน"

  }catch(e){
    console.error(e)
    status.innerText="❌ โหลดไม่สำเร็จ"
  }
}

// ================= START =================
function startAll(){
  unlockAudio()
  startCamera()
}

// ================= LOAD FACE =================
async function loadFaceDatabase(){
  try{
    const res = await fetch(API_URL+"?action=faces&t="+Date.now())
    const data = await res.json()

    knownFaces = data.map(u=>({
      studentId:u.studentId,
      name:u.name,
      class:u.department,
      descriptor:new Float32Array(u.descriptor)
    }))

    status.innerText="พนักงาน: "+knownFaces.length+" คน"

  }catch(e){
    status.innerText="❌ โหลดใบหน้าไม่ได้"
  }
}

// ================= LOAD LOCATION =================
async function loadLocations(){
  try{
    const res = await fetch(API_URL+"?action=locations&t="+Date.now())
    const data = await res.json()

    locationsData = data

    const select=document.getElementById("locationSelect")

    data.forEach(loc=>{
      const opt=document.createElement("option")
      opt.value=loc.name
      opt.textContent=loc.name
      select.appendChild(opt)
    })

  }catch(e){}
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
    .then(stream=>{
      video.srcObject=stream
      startScanLoop()
    })
    .catch(()=>{
      alert("❌ เปิดกล้องไม่ได้")
    })
}

// ================= SCAN =================
function startScanLoop(){

  if(scanInterval) clearInterval(scanInterval)

  scanInterval=setInterval(async()=>{

    if(isProcessing) return

    const detection = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!detection) return

    const best = findBestMatch(detection.descriptor)

    if(best && best.distance < MATCH_THRESHOLD){
      isProcessing = true
      clearInterval(scanInterval)
      confirmAttendance(best)
    }

  },800)
}

// ================= MATCH =================
function findBestMatch(query){

  let best=null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)
    if(!best || dist < best.distance){
      best={...face, distance:dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({lat:pos.coords.latitude,lng:pos.coords.longitude}),
      ()=>resolve({lat:"",lng:""}),
      {enableHighAccuracy:true,timeout:15000}
    )
  })
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x=>x*Math.PI/180

  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= CONFIRM =================
async function confirmAttendance(user){

  const type=document.getElementById("typeSelect").value
  const locationName=document.getElementById("locationSelect").value || "นอกสถานที่"

  const gps = await getGPS()

  // ⭐ กัน GPS ว่าง
  if(!gps.lat){
    playSound("ERROR")
    alert("❌ เปิด GPS ก่อน")
    isProcessing=false
    startScanLoop()
    return
  }

  const locationText = gps.lat+","+gps.lng

  const loc = locationsData.find(l=>l.name===locationName)

  if(loc){
    const dist = getDistance(gps.lat,gps.lng,loc.lat,loc.lng)

    if(dist > (loc.radius || 300)){
      playSound("ERROR")
      speak("อยู่นอกพื้นที่")
      alert("❌ อยู่นอกพื้นที่")
      isProcessing=false
      startScanLoop()
      return
    }
  }

  if(!confirm(`ยืนยัน ${type}\n${user.name}`)){
    isProcessing=false
    startScanLoop()
    return
  }

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:locationText,
      locationName:locationName
    })
  })

  playSound(type)

  if(type==="IN"){
    speak("สวัสดี "+user.name)
  }else{
    speak("ลาก่อน "+user.name)
  }

  alert("✅ บันทึกสำเร็จ")
  location.reload()
}

</script>

</body>
</html>
