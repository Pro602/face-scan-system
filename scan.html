<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สแกนเข้างาน</title>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:380px;
  border-radius:15px;
  transform:scaleX(-1);
}
button,select{
  padding:12px;
  border-radius:8px;
  margin:5px;
}
#status{margin:10px}
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังเริ่มระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน</option>
  <option value="OUT">ออกงาน</option>
</select>

<select id="locationSelect">
  <option value="">-- นอกสถานที่ --</option>
</select>

<br>
<button onclick="startCamera()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = "https://script.google.com/macros/s/AKfycbz7q9qmKaoWOm-a15qX61fHS9SdYynVK2qOUkEJtmmPo1XM7msl0dSTYnvbSEKjOyjEDA/exec"

const video = document.getElementById("video")
const status = document.getElementById("status")

const MATCH_THRESHOLD = 0.45
let knownFaces = []
let locationsData = []
let blinkDetected = false
let lastEyeOpen = true

// ================= INIT =================
window.onload = init

async function init(){

  status.innerText = "โหลด AI..."

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  status.innerText = "โหลดข้อมูล..."

  await loadFaceDB()
  await loadLocations()

  status.innerText = "พร้อมใช้งาน (กระพริบตา)"
}

// ================= LOAD DB =================
async function loadFaceDB(){
  try{
    const res = await fetch(API_URL + "?action=faces")
    const data = await res.json()

    knownFaces = data.map(u => ({
      studentId: u.studentId,
      name: u.name,
      class: u.department,
      descriptor: new Float32Array(u.descriptor)
    }))

  }catch(e){
    status.innerText = "❌ โหลดข้อมูลไม่ได้"
  }
}

// ================= LOAD LOCATIONS =================
async function loadLocations(){
  try{
    const res = await fetch(API_URL + "?action=locations")
    const data = await res.json()

    locationsData = data

    const select = document.getElementById("locationSelect")

    data.forEach(loc=>{
      const opt = document.createElement("option")
      opt.value = loc.name
      opt.textContent = loc.name
      select.appendChild(opt)
    })

  }catch(e){
    console.log(e)
  }
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({
    video:{ width:320, height:240 }
  })
  .then(stream=>{
    video.srcObject = stream
    scanLoop()
  })
}

// ================= BLINK =================
function detectBlink(landmarks){
  const eye = landmarks.getLeftEye()
  const open = Math.abs(eye[1].y - eye[5].y)

  if(open < 4 && lastEyeOpen){
    blinkDetected = true
  }
  lastEyeOpen = open > 5
}

// ================= SCAN =================
function scanLoop(){

  setInterval(async ()=>{

    const detection = await faceapi
      .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!detection) return

    detectBlink(detection.landmarks)

    if(!blinkDetected){
      status.innerText = "กรุณากระพริบตา"
      return
    }

    const best = findBestMatch(detection.descriptor)

    if(best && best.distance < MATCH_THRESHOLD){
      confirmAttendance(best)
    }

  },800)
}

// ================= MATCH =================
function findBestMatch(query){

  let best = null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)
    if(!best || dist < best.distance){
      best = {...face, distance:dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>{
        resolve({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        })
      },
      ()=>resolve({lat:"",lng:""}),
      { enableHighAccuracy:true, timeout:10000 }
    )
  })
}

function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x => x*Math.PI/180

  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R * (2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= SAVE =================
async function confirmAttendance(user){

  const type = document.getElementById("typeSelect").value
  const locationName = document.getElementById("locationSelect").value || "นอกสถานที่"

  const gps = await getGPS()

  if(!gps.lat){
    alert("❌ เปิด GPS ก่อน")
    return
  }

  const loc = locationsData.find(l =>
    l.name.trim().toLowerCase() === locationName.trim().toLowerCase()
  )

  if(loc){
    const dist = getDistance(gps.lat, gps.lng, loc.lat, loc.lng)
    if(dist > (loc.radius || 100)){
      alert("❌ อยู่นอกพื้นที่")
      return
    }
  }

  playBeep()

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:gps.lat+","+gps.lng,
      locationName:locationName,
      status:"ปกติ"
    })
  })

  alert("✅ บันทึกสำเร็จ")
  location.reload()
}

// ================= SOUND =================
function playBeep(){
  new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play()
}

</script>

</body>
</html>
