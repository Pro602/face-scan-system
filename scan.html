<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; }
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังโหลดระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- นอกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []

let isProcessing = false
let hasSaved = false   // ⭐ กันบันทึกซ้ำ
let lastLocationAlert = ""
let cooldown = false   // ⭐ กันยิงรัว

const MATCH_THRESHOLD = 0.45

// ================= AUDIO =================
let audioReady=false

function unlockAudio(){
  const a=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  a.play().then(()=>{
    a.pause()
    audioReady=true
  }).catch(()=>{})
}

function playSound(type){
  if(!audioReady) return
  let url=""
  if(type==="IN") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else if(type==="OUT") url="https://www.soundjay.com/buttons/sounds/button-4.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"

  new Audio(url).play().catch(()=>{})
}

function speak(text){
  if(!audioReady) return
  const msg=new SpeechSynthesisUtterance(text)
  msg.lang="th-TH"
  speechSynthesis.speak(msg)
}

// ================= INIT =================
window.onload=init

async function init(){

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaces()
  await loadLocations()

  status.innerText="พร้อมใช้งาน"
}

// ================= LOAD =================
async function loadFaces(){
  const res=await fetch(API_URL+"?action=faces&t="+Date.now())
  const data=await res.json()

  knownFaces=data.map(u=>({
    studentId:u.studentId,
    name:u.name,
    class:u.department,
    descriptor:new Float32Array(u.descriptor)
  }))
}

async function loadLocations(){
  const res=await fetch(API_URL+"?action=locations&t="+Date.now())
  const data=await res.json()

  locationsData=data

  const select=document.getElementById("locationSelect")

  data.forEach(l=>{
    const opt=document.createElement("option")
    opt.value=l.name
    opt.textContent=l.name
    select.appendChild(opt)
  })
}

// ================= START =================
function startAll(){
  unlockAudio()

  hasSaved=false
  cooldown=false

  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    video.srcObject=stream
    runScan()
  })
}

// ================= SCAN =================
async function runScan(){

  if(isProcessing || hasSaved || cooldown) return

  const det = await faceapi
    .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceDescriptor()

  if(!det){
    requestAnimationFrame(runScan)
    return
  }

  const best = findMatch(det.descriptor)

  if(best && best.distance < MATCH_THRESHOLD){

    isProcessing=true

    // 🔥 สุ่ม action (เร็วกว่า)
    const action = randomAction()
    await doActionCheck(action)

    await confirmAttendance(best)

    isProcessing=false
  }

  requestAnimationFrame(runScan)
}

// ================= ACTION =================
function randomAction(){
  const arr=["LEFT","RIGHT","UP"]
  return arr[Math.floor(Math.random()*arr.length)]
}

async function doActionCheck(action){

  let success=false
  let timeout=0

  if(action==="LEFT") speak("กรุณาหันซ้าย")
  if(action==="RIGHT") speak("กรุณาหันขวา")
  if(action==="UP") speak("กรุณาพยักหน้า")

  while(!success && timeout<20){

    const det = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()

    if(det){

      const nose = det.landmarks.getNose()[0]

      if(action==="LEFT" && nose.x < 150) success=true
      if(action==="RIGHT" && nose.x > 250) success=true
      if(action==="UP" && nose.y < 200) success=true
    }

    await new Promise(r=>setTimeout(r,150))
    timeout++
  }

  if(!success){
    playSound("ERROR")
    throw "fail action"
  }
}

// ================= MATCH =================
function findMatch(desc){
  let best=null

  knownFaces.forEach(f=>{
    const d=faceapi.euclideanDistance(desc,f.descriptor)
    if(!best || d<best.distance){
      best={...f,distance:d}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>res(null),
      {enableHighAccuracy:true,timeout:10000}
    )
  })
}

// ================= CONFIRM =================
async function confirmAttendance(user){

  if(hasSaved) return

  const type=document.getElementById("typeSelect").value
  const locName=document.getElementById("locationSelect").value || "OUTSIDE"

  const gps=await getGPS()

  if(!gps){
    playSound("ERROR")
    alert("❌ เปิด GPS")
    return
  }

  // ================= LOCATION CHECK =================
  if(locName !== "OUTSIDE"){

    const loc = locationsData.find(l=>l.name===locName)

    if(loc){
      const dist = getDistance(gps.lat,gps.lng,loc.lat,loc.lng)

      if(dist > (loc.radius || 300)){

        if(lastLocationAlert !== locName){
          lastLocationAlert = locName
          playSound("ERROR")
          alert("❌ อยู่นอกพื้นที่")
        }

        return
      }
    }
  }

  lastLocationAlert=""

  // ================= SAVE =================
  hasSaved=true
  cooldown=true

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:gps.lat+","+gps.lng,
      locationName:(locName==="OUTSIDE"?"นอกสถานที่":locName)
    })
  })

  playSound(type)
  speak(type==="IN" ? "สวัสดี "+user.name : "ลาก่อน "+user.name)

  alert("✅ บันทึกสำเร็จ")

  // ⭐ กันยิงซ้ำ 5 วิ
  setTimeout(()=>{
    cooldown=false
  },5000)
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R=6371e3
  const toRad=x=>x*Math.PI/180

  const dLat=toRad(lat2-lat1)
  const dLon=toRad(lon2-lon1)

  const a=
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

</script>
</body>
</html>
