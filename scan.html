<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; }
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังโหลดระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- นอกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []

let isProcessing = false
let scanInterval = null

const MATCH_THRESHOLD = 0.45

// ================= 🔥 RANDOM CHALLENGE =================
const challenges = ["LEFT","RIGHT","UPDOWN","MOUTH"]
let currentChallenge = null
let challengePassed = false

function randomChallenge(){
  currentChallenge = challenges[Math.floor(Math.random()*challenges.length)]
  challengePassed = false

  if(currentChallenge==="LEFT") speak("กรุณาหันซ้าย")
  if(currentChallenge==="RIGHT") speak("กรุณาหันขวา")
  if(currentChallenge==="UPDOWN") speak("กรุณาพยักหน้า")
  if(currentChallenge==="MOUTH") speak("กรุณาอ้าปาก")
}

function getChallengeText(){
  if(currentChallenge==="LEFT") return "👉 หันซ้าย"
  if(currentChallenge==="RIGHT") return "👉 หันขวา"
  if(currentChallenge==="UPDOWN") return "👉 พยักหน้า"
  if(currentChallenge==="MOUTH") return "👉 อ้าปาก"
  return ""
}

// ================= AUDIO =================
let audioReady=false

function unlockAudio(){
  const a=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  a.play().then(()=>{a.pause();audioReady=true}).catch(()=>{})
}

function speak(text){
  if(!audioReady) return
  const msg=new SpeechSynthesisUtterance(text)
  msg.lang="th-TH"
  speechSynthesis.speak(msg)
}

function playOK(){
  if(!audioReady) return
  new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play()
}

// ================= INIT =================
window.onload=init

async function init(){

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaces()
  await loadLocations()

  status.innerText="พร้อมใช้งาน"
}

// ================= START =================
function startAll(){
  unlockAudio()
  randomChallenge()
  startCamera()
}

// ================= LOAD =================
async function loadFaces(){
  const res=await fetch(API_URL+"?action=faces&t="+Date.now())
  const data=await res.json()

  knownFaces=data.map(u=>({
    studentId:u.studentId,
    name:u.name,
    class:u.department,
    descriptor:new Float32Array(u.descriptor)
  }))
}

async function loadLocations(){
  const res=await fetch(API_URL+"?action=locations&t="+Date.now())
  const data=await res.json()

  locationsData=data

  const select=document.getElementById("locationSelect")

  data.forEach(l=>{
    const opt=document.createElement("option")
    opt.value=l.name
    opt.textContent=l.name
    select.appendChild(opt)
  })
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    video.srcObject=stream
    startScanLoop()
  })
}

// ================= SCAN =================
function startScanLoop(){

  scanInterval=setInterval(async()=>{

    if(isProcessing) return

    const det = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!det) return

    const lm = det.landmarks
    const nose = lm.getNose()[3]
    const box = det.detection.box

    const centerX = box.x + box.width/2
    const offsetX = nose.x - centerX

    const jaw = lm.getJawOutline()
    const mouthOpen = jaw[8].y - lm.getNose()[6].y

    status.innerText = getChallengeText()

    // ================= CHECK =================
    if(currentChallenge==="LEFT" && offsetX < -20){
      challengePassed = true
    }

    if(currentChallenge==="RIGHT" && offsetX > 20){
      challengePassed = true
    }

    if(currentChallenge==="UPDOWN"){
      if(nose.y > box.y + box.height*0.6){
        challengePassed = true
      }
    }

    if(currentChallenge==="MOUTH"){
      if(mouthOpen > 25){
        challengePassed = true
      }
    }

    // ================= PASS =================
    if(challengePassed){

      const best = findMatch(det.descriptor)

      if(best && best.distance < MATCH_THRESHOLD){

        isProcessing=true
        clearInterval(scanInterval)

        playOK()
        confirmAttendance(best)
      }
    }

  },400)
}

// ================= MATCH =================
function findMatch(desc){
  let best=null
  knownFaces.forEach(f=>{
    const d=faceapi.euclideanDistance(desc,f.descriptor)
    if(!best || d<best.distance){
      best={...f,distance:d}
    }
  })
  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>res(null)
    )
  })
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R=6371e3
  const toRad=x=>x*Math.PI/180
  const dLat=toRad(lat2-lat1)
  const dLon=toRad(lon2-lon1)

  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= SAVE =================
async function confirmAttendance(user){

  const type=document.getElementById("typeSelect").value
  const locationName=document.getElementById("locationSelect").value || "นอกสถานที่"

  const gps = await getGPS()

  if(!gps){
    alert("❌ เปิด GPS ก่อน")
    return
  }

  const loc = locationsData.find(l=>l.name===locationName)

  if(loc){
    const dist = getDistance(gps.lat,gps.lng,loc.lat,loc.lng)
    if(dist > (loc.radius || 300)){
      alert("❌ อยู่นอกพื้นที่")
      return
    }
  }

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:gps.lat+","+gps.lng,
      locationName:locationName
    })
  })

  alert("✅ บันทึกสำเร็จ")
  location.reload()
}

</script>
</body>
</html>
