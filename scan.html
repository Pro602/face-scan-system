<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
  /* --- เพิ่มส่วนแอนิเมชัน Logo --- */
  .logo-wrapper { position: relative; display: inline-block; perspective: 1000px; margin-bottom: 10px; }
  .logo-spin { animation: spin360 8s linear infinite; transform-style: preserve-3d; width: 70px; height: 70px; object-fit: contain; }
  @keyframes spin360 { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
  
  .brand-name { color: #60a5fa; font-weight: bold; font-size: 20px; margin: 5px 0 0 0; }
  .brand-subtitle { color: #64748b; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; }
  /* -------------------------- */
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; font-size:18px; }
</style>
</head>

<body>

  <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
    <div class="logo-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1rlAx7j8TDQBCnqrBts_mzs75U1U1aYy3" alt="Logo" class="logo-spin">
    </div>
    <h1 class="brand-name">THAISIAM INKJET</h1>
    <p class="brand-subtitle">Professional Attendance Recording Systems</p>
  </div>

  <div id="status">กำลังโหลดระบบ...</div>

  <video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- เลือกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

// ================= VAR =================
const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []
let scanInterval = null
let isProcessing = false

// 🔥 กันรูป
let challenge = ""
let challengePassed = false
let isDetecting = false   // 🔥 ตัวนี้สำคัญ
let faceCaptured = false
let isLocked = false
let alreadySent = false   // 🔥 ตัวนี้สำคัญสุด
const MATCH_THRESHOLD = 0.4

// ================= AUDIO =================
let audioReady = false

function unlockAudio(){
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  audio.play().then(()=>{
    audio.pause()
    audio.currentTime = 0
    audioReady = true
  })
}

function playSound(type){
  if(!audioReady) return

  let url = ""

  if(type==="IN") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else if(type==="OUT") url="https://www.soundjay.com/buttons/sounds/button-4.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"

  new Audio(url).play()
}

function speak(text){
  if(!audioReady) return
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "th-TH"
  speechSynthesis.speak(msg)
}

// ================= INIT =================
window.onload = init

async function init(){

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaceDatabase()
  await loadLocations()

  status.innerText="พร้อมใช้งาน"
}

// ================= START =================
function startAll(){
  unlockAudio()
  generateChallenge()
  startCamera()
}

// ================= RANDOM ACTION =================
function generateChallenge(){
  const actions = ["LEFT","RIGHT"]
  challenge = actions[Math.floor(Math.random()*actions.length)]
  challengePassed = false

  if(challenge==="LEFT"){
    status.innerText="👉 กรุณาหันหน้าไปทางซ้าย"
  }else{
    status.innerText="👉 กรุณาหันหน้าไปทางขวา"
  }
}

// ================= LOAD FACE =================
async function loadFaceDatabase(){
  const res = await fetch(API_URL+"?action=faces&t="+Date.now())
  const data = await res.json()

  knownFaces = data.map(u => ({
    studentId: u.studentId,
    name: u.name,
    class: u.department,
    descriptor: new Float32Array(u.descriptor) // ✅ ตัวเดียว
  }))
}

// ================= LOAD LOCATION =================
async function loadLocations(){
  const res = await fetch(API_URL+"?action=locations")
  const data = await res.json()

  locationsData = data

  const select=document.getElementById("locationSelect")

  data.forEach(loc=>{
    const opt=document.createElement("option")
    opt.value=loc.name
    opt.textContent=loc.name
    select.appendChild(opt)
  })
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
    .then(stream=>{
      video.srcObject=stream
      startScanLoop()
    })
}

// ================= SCAN =================
function startScanLoop(){

  if(scanInterval) clearInterval(scanInterval)

  scanInterval = setInterval(async()=>{

    // 🔒 กันทุกสถานะ
    if(isProcessing || faceCaptured || isLocked || alreadySent) return

    isLocked = true

    try{

      status.innerText = "📸 กำลังสแกน..."

      // =========================
      // 🧠 LIVENESS
      // =========================
      let descriptor = await captureSmartLiveness()

      // =========================
      // 🔥 FALLBACK (เครื่องช้า / กล้องกาก)
      // =========================
      if(!descriptor){
        console.log("fallback normal scan")

        const det = await faceapi
          .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks()
          .withFaceDescriptor()

        // ❌ ไม่เจอหน้า
        if(!det) return

        // 🔥 กันภาพเบื้องต้น (ความมั่นใจต่ำไม่เอา)
        if(det.detection.score < 0.6) return

        descriptor = det.descriptor
      }

      // =========================
      // 🎯 MATCH
      // =========================
      const best = findBestMatch(descriptor)

      if(best && best.distance < MATCH_THRESHOLD){

        // 🔥 กันพลาดซ้ำ
        if(best.distance > 0.38) return

        // 🔒 LOCK HARD
        alreadySent = true
        faceCaptured = true
        isProcessing = true

        clearInterval(scanInterval)

        // หน่วงนิดให้ภาพนิ่ง
        setTimeout(async ()=>{
          await confirmAttendance(best)
        }, 300)

        return
      }

    }catch(err){
      console.error(err)

    } finally {
      // 🔓 ปลดล็อกเสมอ (สำคัญมาก)
      isLocked = false
    }

  },350) // ⚡ เร็ว + ไม่หนักเครื่อง
}
// ================= MATCH =================
function findBestMatch(query){
  let best = null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)

    if(!best || dist < best.distance){
      best = {...face, distance: dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      }),
      ()=>resolve({lat:"",lng:""}),
      {enableHighAccuracy:true,timeout:10000}
    )
  })
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x=>x*Math.PI/180

  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= CONFIRM =================
async function confirmAttendance(user) {

  const type = document.getElementById("typeSelect").value;
  const locationName = document.getElementById("locationSelect").value;

  // ===============================
  // ❌ ไม่เลือกสถานที่
  // ===============================
  if (!locationName) {
    alert("❌ กรุณาเลือกสถานที่");

    isProcessing = false;
    isLocked = false;
    faceCaptured = false;
    alreadySent = false;

    startScanLoop();
    return;
  }

  // ===============================
  // 📍 GPS
  // ===============================
  const gps = await getGPS();

  if (!gps.lat) {
    alert("❌ กรุณาเปิด GPS");

    isProcessing = false;
    isLocked = false;
    faceCaptured = false;
    alreadySent = false;

    startScanLoop();
    return;
  }

  const locationText = gps.lat + "," + gps.lng;
  const loc = locationsData.find(l => l.name === locationName);

  // ===============================
  // 📏 ตรวจระยะ (เหมือนเดิม 100%)
  // ===============================
  if (loc) {
    const dist = getDistance(gps.lat, gps.lng, loc.lat, loc.lng);
    const radius = loc.radius || 300;

    if (locationName !== "ทำงานนอกสถานที่" && dist > radius) {
      playSound("ERROR");
      speak("อยู่นอกพื้นที่");

      alert("❌ คุณอยู่ห่างจาก " + locationName + " ประมาณ " + Math.round(dist) + " เมตร (จำกัดที่ " + radius + " เมตร)");

      isProcessing = false;
      isLocked = false;
      faceCaptured = false;
      alreadySent = false;

      startScanLoop();
      return;
    }
  }

  // ===============================
  // ❗ confirm
  // ===============================
  if (!confirm(`ยืนยัน ${type}\n${user.name}`)) {

    isProcessing = false;
    isLocked = false;
    faceCaptured = false;
    alreadySent = false;

    startScanLoop();
    return;
  }

  // ===============================
  // 📸 ถ่ายรูปก่อนปิดกล้อง
  // ===============================
  const imageBase64 = captureImage();

  // ปิดกล้องหลัง capture (กันภาพดำ)
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  status.innerText = "⏳ กำลังบันทึกข้อมูล...";

  try {

    // ===============================
    // 🔵 1. บันทึกข้อมูล
    // ===============================
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "attendance",
        studentId: user.studentId,
        name: user.name,
        department: user.class,
        type: type,
        location: locationText,
        locationName: locationName
      })
    });

    // ⏱ กันยิงซ้ำ
    await new Promise(resolve => setTimeout(resolve, 1000));

    // ===============================
    // 🟢 2. บันทึกรูป
    // ===============================
    status.innerText = "📸 กำลังบันทึกรูปภาพ...";

    const params = new URLSearchParams();
    params.append("action", "uploadImage");
    params.append("studentId", user.studentId);
    params.append("image", imageBase64);

    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: params.toString()
    });

    // ===============================
    // ✅ SUCCESS
    // ===============================
    playSound(type);

    await Swal.fire({
      title: 'บันทึกสำเร็จ',
      text: 'บันทึกข้อมูลและรูปภาพเรียบร้อยแล้ว',
      icon: 'success',
      confirmButtonText: 'ตกลง',
      confirmButtonColor: '#6366f1',
      allowOutsideClick: false
    });

    // ===============================
    // 🔓 RESET LOCK (สำคัญสุด)
    // ===============================
    isProcessing = false;
    isLocked = false;
    faceCaptured = false;
    alreadySent = false;

    // ===============================
    // 🔁 REDIRECT
    // ===============================
    if (window.opener) {
      window.close();
    } else {
      window.location.href = "https://pro602.github.io/Scan/?v=1.1";
    }

  } catch (err) {
    console.error(err);
    alert("❌ เกิดข้อผิดพลาดในการบันทึกภาพ");

    // ===============================
    // 🔓 RESET ตอน ERROR
    // ===============================
    isProcessing = false;
    isLocked = false;
    faceCaptured = false;
    alreadySent = false;

    startScanLoop();
  }
}
// ปรับให้ภาพเล็กลงที่สุดเพื่อความชัวร์ (120x90, คุณภาพ 0.1)
function captureImage() {
  const canvas = document.createElement("canvas");
  canvas.width = 320; 
  canvas.height = 240;  
  const ctx = canvas.getContext("2d");

  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  return canvas.toDataURL("image/jpeg", 0.5); 
}

async function captureSmartLiveness(){

  const samples = []
  let blinkDetected = false

  for(let i=0;i<3;i++){

    const det = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(det){

      samples.push(det.descriptor)

      // 🔥 ตรวจ blink
      if(isBlinking(det.landmarks)){
        blinkDetected = true
      }
    }

    await new Promise(r => setTimeout(r,120))
  }

  if(samples.length === 0) return null

  // ❌ ไม่กระพริบ = อาจเป็นรูป
  if(!blinkDetected){
    console.log("no blink detected")
    return null
  }

  // ✅ average descriptor
  const avg = new Float32Array(samples[0].length)

  samples.forEach(d=>{
    for(let i=0;i<d.length;i++){
      avg[i]+=d[i]
    }
  })

  for(let i=0;i<avg.length;i++){
    avg[i]/=samples.length
  }

  return avg
}

  function isBlinking(landmarks){
  const leftEye = landmarks.getLeftEye()
  const rightEye = landmarks.getRightEye()

  function eyeAspectRatio(eye){
    const A = Math.hypot(eye[1].x - eye[5].x, eye[1].y - eye[5].y)
    const B = Math.hypot(eye[2].x - eye[4].x, eye[2].y - eye[4].y)
    const C = Math.hypot(eye[0].x - eye[3].x, eye[0].y - eye[3].y)
    return (A + B) / (2.0 * C)
  }

  const leftEAR = eyeAspectRatio(leftEye)
  const rightEAR = eyeAspectRatio(rightEye)

  const EAR = (leftEAR + rightEAR) / 2

  // 🔥 ค่าต่ำ = หลับตา
  return EAR < 0.20
}
  
</script>

</body>
</html>
