<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; font-size:18px; }
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังโหลดระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- เลือกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

// ================= VAR =================
const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []
let scanInterval = null
let isProcessing = false

// 🔥 กันรูป
let challenge = ""
let challengePassed = false

const MATCH_THRESHOLD = 0.45

// ================= AUDIO =================
let audioReady = false

function unlockAudio(){
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  audio.play().then(()=>{
    audio.pause()
    audio.currentTime = 0
    audioReady = true
  })
}

function playSound(type){
  if(!audioReady) return

  let url = ""

  if(type==="IN") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else if(type==="OUT") url="https://www.soundjay.com/buttons/sounds/button-4.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"

  new Audio(url).play()
}

function speak(text){
  if(!audioReady) return
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "th-TH"
  speechSynthesis.speak(msg)
}

// ================= INIT =================
window.onload = init

async function init(){

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaceDatabase()
  await loadLocations()

  status.innerText="พร้อมใช้งาน"
}

// ================= START =================
function startAll(){
  unlockAudio()
  generateChallenge()
  startCamera()
}

// ================= RANDOM ACTION =================
function generateChallenge(){
  const actions = ["LEFT","RIGHT"]
  challenge = actions[Math.floor(Math.random()*actions.length)]
  challengePassed = false

  if(challenge==="LEFT"){
    status.innerText="👉 กรุณาหันหน้าไปทางซ้าย"
  }else{
    status.innerText="👉 กรุณาหันหน้าไปทางขวา"
  }
}

// ================= LOAD FACE =================
async function loadFaceDatabase(){
  const res = await fetch(API_URL+"?action=faces&t="+Date.now())
  const data = await res.json()

  knownFaces = data.map(u=>({
    studentId:u.studentId,
    name:u.name,
    class:u.department,
    descriptor:new Float32Array(u.descriptor)
  }))
}

// ================= LOAD LOCATION =================
async function loadLocations(){
  const res = await fetch(API_URL+"?action=locations")
  const data = await res.json()

  locationsData = data

  const select=document.getElementById("locationSelect")

  data.forEach(loc=>{
    const opt=document.createElement("option")
    opt.value=loc.name
    opt.textContent=loc.name
    select.appendChild(opt)
  })
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
    .then(stream=>{
      video.srcObject=stream
      startScanLoop()
    })
}

// ================= SCAN =================
function startScanLoop(){

  if(scanInterval) clearInterval(scanInterval)

  scanInterval=setInterval(async()=>{

    if(isProcessing) return

    const detection = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!detection) return

    // 🔥 ตรวจหันหน้า (กันรูป)
    const nose = detection.landmarks.getNose()
    const noseX = nose[3].x
    const faceCenter = detection.detection.box.x + detection.detection.box.width/2

    if(!challengePassed){

      if(challenge==="LEFT" && noseX < faceCenter - 10){
        challengePassed = true
        status.innerText="✅ ผ่านการตรวจสอบ"
      }

      if(challenge==="RIGHT" && noseX > faceCenter + 10){
        challengePassed = true
        status.innerText="✅ ผ่านการตรวจสอบ"
      }

      return
    }

    const best = findBestMatch(detection.descriptor)

    if(best && best.distance < MATCH_THRESHOLD){
      isProcessing = true
      clearInterval(scanInterval)
      confirmAttendance(best)
    }

  },500)
}

// ================= MATCH =================
function findBestMatch(query){
  let best=null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)
    if(!best || dist < best.distance){
      best={...face, distance:dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>resolve({
        lat:pos.coords.latitude,
        lng:pos.coords.longitude
      }),
      ()=>resolve({lat:"",lng:""}),
      {enableHighAccuracy:true,timeout:10000}
    )
  })
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x=>x*Math.PI/180

  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= CONFIRM =================
async function confirmAttendance(user) {
  const type = document.getElementById("typeSelect").value;
  const locationName = document.getElementById("locationSelect").value;

  // 1. ตรวจสอบการเลือกสถานที่
  if (!locationName) {
    alert("❌ กรุณาเลือกสถานที่");
    isProcessing = false;
    startScanLoop();
    return;
  }

  // 2. ตรวจสอบ GPS
  const gps = await getGPS();
  if (!gps.lat) {
    alert("❌ กรุณาเปิด GPS");
    isProcessing = false;
    startScanLoop();
    return;
  }

  const locationText = gps.lat + "," + gps.lng;
  const loc = locationsData.find(l => l.name === locationName);

  // 3. ตรวจสอบระยะทาง (Location Validation)
  if (loc) {
    const dist = getDistance(gps.lat, gps.lng, loc.lat, loc.lng);
    if (dist > (loc.radius || 300)) {
      playSound("ERROR");
      speak("อยู่นอกพื้นที่");
      alert("❌ อยู่นอกพื้นที่ (ระยะห่าง: " + Math.round(dist) + " เมตร)");
      isProcessing = false;
      startScanLoop();
      return;
    }
  }

  // 4. ยืนยันก่อนบันทึก
  if (!confirm(`ยืนยัน ${type}\n${user.name}`)) {
    isProcessing = false;
    startScanLoop();
    return;
  }

  status.innerText = "⏳ กำลังบันทึกข้อมูลและรูปภาพ...";

  // 📸 จับภาพหน้าจอ (ทำหลังจากกดยืนยันเพื่อความเร็ว)
  const imageBase64 = captureImage();

  try {
    // 5. ส่งข้อมูลไปยัง Google Apps Script
    // หมายเหตุ: ไม่ใช้ no-cors เพื่อให้ดักจับ Error ได้แม่นยำขึ้น
    const response = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "attendance",
        studentId: user.studentId,
        name: user.name,
        department: user.class,
        type: type,
        location: locationText,
        locationName: locationName,
        image: imageBase64 
      })
    });

    // 6. แจ้งเตือนเมื่อสำเร็จ
    playSound(type);
    if (type === "IN") {
      speak("สวัสดี " + user.name);
    } else {
      speak("ลาก่อน " + user.name);
    }

    alert("✅ บันทึกสำเร็จ");
    location.reload(); // รีโหลดหน้าจอเพื่อเริ่มใหม่

  } catch (err) {
    console.error("Fetch Error:", err);
    // กรณีที่ fetch ติด CORS แต่จริงๆ ข้อมูลอาจเข้าแล้ว (เป็นพฤติกรรมปกติของ GAS)
    // ให้รอสักครู่แล้วแจ้งสำเร็จ หรือแจ้งตรวจสอบเน็ต
    alert("✅ ดำเนินการเสร็จสิ้น (หากข้อมูลไม่ขึ้นโปรดตรวจสอบอินเทอร์เน็ต)");
    location.reload();
  }
}

function captureImage() {
  const canvas = document.createElement("canvas");
  // ลดขนาดลงเล็กน้อยเพื่อความเร็วในการส่งข้อมูล (240x180 ประหยัดแบนด์วิธกว่า)
  canvas.width = 240;
  canvas.height = 180;

  const ctx = canvas.getContext("2d");
  
  // Mirror ภาพให้ตรงกับที่ตาเห็น
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // ใช้คุณภาพ 0.3 เพื่อให้ไฟล์มีขนาดประมาณ 10-20KB (ส่งไวและไม่ค้าง)
  return canvas.toDataURL("image/jpeg", 0.3);
}
</script>

</body>
</html>
