<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; }
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังโหลดระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- นอกสถานที่ --</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []

let isProcessing = false
let scanInterval = null

const MATCH_THRESHOLD = 0.45

// ================= 🔥 LIVENESS =================
let step = 0
/*
0 = หันซ้าย
1 = หันขวา
2 = กะพริบตา
3 = ผ่าน
*/

let blinkCount = 0
let eyeClosed = false

function getStepText(){
  if(step === 0) return "👉 กรุณาหันหน้าไปทางซ้าย"
  if(step === 1) return "👉 กรุณาหันหน้าไปทางขวา"
  if(step === 2) return "👉 กรุณากะพริบตา"
  return "✅ ยืนยันตัวตนสำเร็จ"
}

// ================= AUDIO =================
let audioReady = false

function unlockAudio(){
  const a=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  a.play().then(()=>{
    a.pause()
    audioReady=true
  }).catch(()=>{})
}

function speak(text){
  if(!audioReady) return
  const msg = new SpeechSynthesisUtterance(text)
  msg.lang = "th-TH"
  speechSynthesis.speak(msg)
}

function playSound(type){
  if(!audioReady) return
  let url=""
  if(type==="OK") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"
  new Audio(url).play().catch(()=>{})
}

// ================= INIT =================
window.onload = init

async function init(){

  status.innerText="โหลด AI..."

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFaces()
  await loadLocations()

  status.innerText="พร้อมใช้งาน"
}

// ================= START =================
function startAll(){
  unlockAudio()
  startCamera()
}

// ================= LOAD DATA =================
async function loadFaces(){
  const res = await fetch(API_URL+"?action=faces&t="+Date.now())
  const data = await res.json()

  knownFaces = data.map(u=>({
    studentId:u.studentId,
    name:u.name,
    class:u.department,
    descriptor:new Float32Array(u.descriptor)
  }))
}

async function loadLocations(){
  const res = await fetch(API_URL+"?action=locations&t="+Date.now())
  const data = await res.json()

  locationsData = data

  const select=document.getElementById("locationSelect")

  data.forEach(l=>{
    const opt=document.createElement("option")
    opt.value=l.name
    opt.textContent=l.name
    select.appendChild(opt)
  })
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    video.srcObject=stream
    startScanLoop()
  })
}

// ================= 🔥 ตรวจตา =================
function getEAR(eye){
  const a = dist(eye[1], eye[5])
  const b = dist(eye[2], eye[4])
  const c = dist(eye[0], eye[3])
  return (a + b) / (2.0 * c)
}

function dist(p1,p2){
  return Math.hypot(p1.x-p2.x, p1.y-p2.y)
}

// ================= SCAN =================
function startScanLoop(){

  scanInterval = setInterval(async()=>{

    if(isProcessing) return

    const det = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!det) return

    const landmarks = det.landmarks

    const nose = landmarks.getNose()[3].x
    const box = det.detection.box

    const faceCenter = box.x + box.width/2

    const offset = nose - faceCenter

    // ================= STEP 0: หันซ้าย =================
    if(step === 0){
      status.innerText = getStepText()

      if(offset < -20){
        step = 1
        speak("ดีมาก ต่อไปหันขวา")
      }
      return
    }

    // ================= STEP 1: หันขวา =================
    if(step === 1){
      status.innerText = getStepText()

      if(offset > 20){
        step = 2
        speak("ดีมาก ต่อไปกะพริบตา")
      }
      return
    }

    // ================= STEP 2: กะพริบ =================
    if(step === 2){

      const leftEye = landmarks.getLeftEye()
      const rightEye = landmarks.getRightEye()

      const ear = (getEAR(leftEye) + getEAR(rightEye)) / 2

      if(ear < 0.2 && !eyeClosed){
        eyeClosed = true
      }

      if(ear > 0.25 && eyeClosed){
        blinkCount++
        eyeClosed = false
      }

      if(blinkCount >= 1){
        step = 3
        speak("ยืนยันตัวตนสำเร็จ")
        playSound("OK")
      }

      status.innerText = getStepText()
      return
    }

    // ================= STEP 3: MATCH =================
    if(step === 3){

      const best = findMatch(det.descriptor)

      if(best && best.distance < MATCH_THRESHOLD){

        isProcessing = true
        clearInterval(scanInterval)

        confirmAttendance(best)
      }
    }

  },500)
}

// ================= MATCH =================
function findMatch(desc){
  let best=null

  knownFaces.forEach(f=>{
    const d=faceapi.euclideanDistance(desc,f.descriptor)
    if(!best || d<best.distance){
      best={...f,distance:d}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>res(null)
    )
  })
}

// ================= DIST =================
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x=>x*Math.PI/180
  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= SAVE =================
async function confirmAttendance(user){

  const type=document.getElementById("typeSelect").value
  const locationName=document.getElementById("locationSelect").value || "นอกสถานที่"

  const gps = await getGPS()

  if(!gps){
    alert("❌ เปิด GPS ก่อน")
    return
  }

  const loc = locationsData.find(l=>l.name===locationName)

  if(loc){
    const dist = getDistance(gps.lat,gps.lng,loc.lat,loc.lng)
    if(dist > (loc.radius || 300)){
      alert("❌ อยู่นอกพื้นที่")
      return
    }
  }

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:gps.lat+","+gps.lng,
      locationName:locationName
    })
  })

  alert("✅ บันทึกสำเร็จ")
  location.reload()
}

</script>

</body>
</html>
