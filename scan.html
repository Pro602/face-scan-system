<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{font-family:sans-serif;background:#0f172a;color:white;text-align:center;padding:20px;}
video{width:100%;max-width:420px;border-radius:15px;transform:scaleX(-1);}
button{padding:12px 25px;font-size:16px;border:none;border-radius:30px;background:#6366f1;color:white;margin-top:15px;}
#status{margin:10px;}
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน (กันโกง)</h2>
<div id="status">กำลังโหลด...</div>

<video id="video" autoplay muted playsinline></video>

<br>
<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || GAS_API_URL

const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let scanInterval = null
let isProcessing = false

// 🔥 กันโกง
let blinkDetected = false
let moveDetected = false
let lastDescriptor = null

// 🔊 เสียง
let audioReady = false

// ================= INIT =================
window.onload = async () => {

  const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ])

  await loadFace()

  status.innerText="พร้อมใช้งาน → กระพริบตา + ขยับหน้า"
}

// ================= AUDIO =================
function unlockAudio(){
  const a = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  a.play().then(()=>{
    a.pause()
    audioReady=true
  }).catch(()=>{})
}

function playSound(){
  if(!audioReady) return
  new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play()
}

function speak(text){
  if(!audioReady) return
  const msg=new SpeechSynthesisUtterance(text)
  msg.lang="th-TH"
  speechSynthesis.speak(msg)
}

// ================= LOAD =================
async function loadFace(){
  const res = await fetch(API_URL+"?action=faces&t="+Date.now())
  const data = await res.json()

  knownFaces = data.map(u=>({
    name:u.name,
    studentId:u.studentId,
    descriptor:new Float32Array(u.descriptor)
  }))
}

// ================= START =================
function startAll(){
  unlockAudio()

  navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>{
      video.srcObject=stream
      startScan()
    })
}

// ================= BLINK =================
function detectBlink(landmarks){

  const eye = landmarks.getLeftEye()
  const dist = Math.abs(eye[0].x - eye[3].x)

  if(dist < 10){
    blinkDetected = true
  }
}

// ================= SCAN =================
function startScan(){

  scanInterval = setInterval(async()=>{

    if(isProcessing) return

    const det = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!det) return

    detectBlink(det.landmarks)

    // 🔥 ตรวจขยับหน้า
    if(lastDescriptor){
      const diff = faceapi.euclideanDistance(det.descriptor,lastDescriptor)
      if(diff > 0.05){
        moveDetected = true
      }
    }

    lastDescriptor = det.descriptor

    // ❌ ยังไม่ผ่าน liveness
    if(!blinkDetected || !moveDetected){
      status.innerText="❗ กระพริบตา + ขยับหน้า"
      return
    }

    const best = findMatch(det.descriptor)

    if(best && best.distance < 0.45){

      isProcessing = true
      clearInterval(scanInterval)

      playSound()
      speak("สวัสดี "+best.name)

      alert("✅ "+best.name)
      location.reload()
    }

  },700)
}

// ================= MATCH =================
function findMatch(query){

  let best=null

  knownFaces.forEach(f=>{
    const d = faceapi.euclideanDistance(query,f.descriptor)
    if(!best || d<best.distance){
      best={...f,distance:d}
    }
  })

  return best
}

</script>

</body>
</html>
