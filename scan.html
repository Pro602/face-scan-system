<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สแกนเข้างาน PRO</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
select,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน (PRO)</h2>

<div id="status">กำลังโหลด...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน</option>
  <option value="OUT">ออกงาน</option>
</select>

<select id="locationSelect">
  <option value="OUTSIDE">นอกสถานที่</option>
</select>

<br>

<button onclick="startAll()">เริ่มสแกน</button>

<script>

// ================= CONFIG =================
const API_URL =
  localStorage.getItem('gasApiUrl') ||
  (typeof GAS_API_URL !== "undefined" ? GAS_API_URL : "")

if(!API_URL){
  alert("❌ ยังไม่ได้ตั้งค่า API")
  throw new Error("No API")
}

// ================= VAR =================
const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces=[]
let locations=[]
let scanning=false
let isProcessing=false

let lastDescriptor=null
let moveCount=0
let lastAlertLocation=""

// 🔊 AUDIO
let audioReady=false

function unlockAudio(){
  const a=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
  a.play().then(()=>{
    a.pause()
    audioReady=true
  }).catch(()=>{})
}

function playSound(type){
  if(!audioReady) return
  let url=""
  if(type==="IN") url="https://www.soundjay.com/buttons/sounds/button-3.mp3"
  else if(type==="OUT") url="https://www.soundjay.com/buttons/sounds/button-4.mp3"
  else url="https://www.soundjay.com/buttons/sounds/button-10.mp3"
  new Audio(url).play().catch(()=>{})
}

function speak(text){
  if(!audioReady) return
  const msg=new SpeechSynthesisUtterance(text)
  msg.lang="th-TH"
  speechSynthesis.speak(msg)
}

// ================= JSONP =================
function loadJSONP(url){
  return new Promise(resolve=>{
    const cb = "cb_" + Date.now()
    window[cb] = function(data){
      resolve(data)
      script.remove()
    }
    const script = document.createElement("script")
    script.src = url + "&callback=" + cb
    document.body.appendChild(script)
  })
}

// ================= INIT =================
window.onload=init

async function init(){
  try{
    status.innerText="โหลด AI..."

    const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ])

    await loadFaces()
    await loadLocations()

    status.innerText="พร้อมใช้งาน"

  }catch(e){
    console.error(e)
    status.innerText="❌ โหลดระบบไม่สำเร็จ"
  }
}

// ================= LOAD FACE =================
async function loadFaces(){
  try{
    status.innerText="โหลดพนักงาน..."
    const data = await loadJSONP(API_URL+"?action=faces")

    knownFaces = data.map(u=>({
      studentId:u.studentId,
      name:u.name,
      class:u.department,
      descriptor:new Float32Array(u.descriptor)
    }))

    status.innerText="พนักงาน "+knownFaces.length+" คน"

  }catch(e){
    status.innerText="❌ โหลดใบหน้าไม่ได้"
  }
}

// ================= LOAD LOCATION =================
async function loadLocations(){
  try{
    const data = await loadJSONP(API_URL+"?action=locations")

    locations = data

    const select=document.getElementById("locationSelect")

    data.forEach(l=>{
      const opt=document.createElement("option")
      opt.value=l.name
      opt.textContent=l.name
      select.appendChild(opt)
    })

  }catch(e){
    status.innerText="❌ โหลด location ไม่ได้"
  }
}

// ================= START =================
function startAll(){
  unlockAudio()

  navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
  .then(stream=>{
    video.srcObject=stream
    scanning=true
    scanLoop()
  })
  .catch(()=> alert("❌ เปิดกล้องไม่ได้"))
}

// ================= SCAN =================
async function scanLoop(){

  if(!scanning) return

  if(isProcessing){
    requestAnimationFrame(scanLoop)
    return
  }

  const det = await faceapi
    .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions({
      inputSize:320,
      scoreThreshold:0.5
    }))
    .withFaceLandmarks()
    .withFaceDescriptor()

  if(det){

    // 🔥 กันรูปถ่าย (ปรับให้ไม่ฆ่าคนจริง)
    if(lastDescriptor){
      const diff = faceapi.euclideanDistance(det.descriptor,lastDescriptor)

      if(diff < 0.008){
        moveCount++
      }else{
        moveCount=0
      }

      if(moveCount > 10){
        status.innerText="❌ ห้ามใช้รูปถ่าย"
        playSound("ERROR")
        return requestAnimationFrame(scanLoop)
      }
    }

    lastDescriptor = det.descriptor

    const best = findMatch(det.descriptor)

    // 🔥 debug distance
    if(best){
      status.innerText = best.name + " ("+best.distance.toFixed(3)+")"
    }

    if(best && best.distance < 0.55){
      isProcessing=true
      await confirmAttendance(best)
      isProcessing=false
    }
  }

  requestAnimationFrame(scanLoop)
}

// ================= MATCH =================
function findMatch(desc){
  let best=null
  knownFaces.forEach(f=>{
    const d=faceapi.euclideanDistance(desc,f.descriptor)
    if(!best || d<best.distance){
      best={...f,distance:d}
    }
  })
  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(res=>{
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>res(null),
      {enableHighAccuracy:true,timeout:10000}
    )
  })
}

// ================= DIST =================
function distance(lat1,lon1,lat2,lon2){
  const R=6371e3
  const toRad=x=>x*Math.PI/180
  const dLat=toRad(lat2-lat1)
  const dLon=toRad(lon2-lon1)

  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= CONFIRM =================
async function confirmAttendance(user){

  const type=document.getElementById("typeSelect").value
  const locName=document.getElementById("locationSelect").value

  const gps=await getGPS()

  if(!gps){
    playSound("ERROR")
    alert("❌ เปิด GPS ก่อน")
    return
  }

  if(locName !== "OUTSIDE"){
    const loc = locations.find(l=>l.name===locName)

    if(loc){
      const dist = distance(gps.lat,gps.lng,loc.lat,loc.lng)

      if(dist > (loc.radius || 300)){
        if(lastAlertLocation !== locName){
          lastAlertLocation = locName
          playSound("ERROR")
          speak("อยู่นอกพื้นที่")
          alert("❌ อยู่นอกพื้นที่")
        }
        return
      }
    }
  }

  lastAlertLocation=""

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:gps.lat+","+gps.lng,
      locationName:(locName==="OUTSIDE"?"นอกสถานที่":locName)
    })
  })

  playSound(type)

  if(type==="IN"){
    speak("สวัสดี "+user.name)
  }else{
    speak("ลาก่อน "+user.name)
  }

  alert("✅ บันทึกสำเร็จ")
}

</script>

</body>
</html>
