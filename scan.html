<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สแกนเข้างาน</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
video{
  width:100%;
  max-width:420px;
  border-radius:15px;
  transform:scaleX(-1);
}
button{
  padding:12px 25px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:#6366f1;
  color:white;
  margin-top:15px;
}
select{
  padding:8px;
  border-radius:8px;
  margin:5px;
}
#status{ margin:10px; }
</style>
</head>

<body>

<h2>📷 สแกนเข้างาน</h2>

<div id="status">กำลังโหลดระบบ...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<select id="typeSelect">
  <option value="IN">เข้างาน (IN)</option>
  <option value="OUT">ออกงาน (OUT)</option>
</select>

<select id="locationSelect">
  <option value="">-- นอกสถานที่ --</option>
</select>

<br>

<button onclick="startCamera()">เริ่มสแกน</button>

<script>
// ================= CONFIG =================
const API_URL = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : "")

if(!API_URL){
  alert("❌ ยังไม่ได้ตั้งค่า API")
}

const video = document.getElementById("video")
const status = document.getElementById("status")

let knownFaces = []
let locationsData = []
let scanInterval = null
let isProcessing = false
let lastDescriptor = null

const MATCH_THRESHOLD = 0.45

// ================= INIT =================
window.onload = init

async function init(){
  try{
    status.innerText="โหลด AI..."

    const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ])

    status.innerText="โหลดข้อมูล..."

    await loadFaceDatabase()
    await loadLocations()

    status.innerText="พร้อมใช้งาน"

  }catch(e){
    console.error(e)
    status.innerText="❌ โหลดระบบไม่สำเร็จ"
  }
}

// ================= LOAD FACE =================
async function loadFaceDatabase(){
  try{
    const res = await fetch(API_URL + "?action=faces&t=" + Date.now(), {
      cache:"no-store"
    })
    const data = await res.json()

    knownFaces = data.map(u=>({
      studentId:u.studentId,
      name:u.name,
      class:u.department,
      descriptor:new Float32Array(u.descriptor)
    }))

    status.innerText = "โหลดพนักงาน: " + knownFaces.length + " คน"

  }catch(e){
    status.innerText="❌ โหลดใบหน้าไม่ได้"
    console.error(e)
  }
}

// ================= LOAD LOCATION =================
async function loadLocations(){
  try{
    const res = await fetch(API_URL + "?action=locations&t=" + Date.now(), {
      cache:"no-store"
    })
    const data = await res.json()

    locationsData = data

    const select=document.getElementById("locationSelect")

    data.forEach(loc=>{
      const opt=document.createElement("option")
      opt.value=loc.name
      opt.textContent=loc.name
      select.appendChild(opt)
    })

  }catch(e){
    console.error(e)
  }
}

// ================= CAMERA =================
function startCamera(){
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"user" }
  }).then(stream=>{
    video.srcObject=stream
    startScanLoop()
  })
}

// ================= SCAN LOOP =================
function startScanLoop(){

  if(scanInterval) clearInterval(scanInterval)

  scanInterval=setInterval(async()=>{

    if(isProcessing) return

    const detection = await faceapi
      .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(!detection) return

    // 🔥 กันใช้รูป (ต้องขยับหน้า)
    if(lastDescriptor){
      const diff = faceapi.euclideanDistance(detection.descriptor, lastDescriptor)
      if(diff < 0.02){
        status.innerText="⚠️ กรุณาขยับหน้า"
        return
      }
    }
    lastDescriptor = detection.descriptor

    const best = findBestMatch(detection.descriptor)

    if(best && best.distance < MATCH_THRESHOLD){
      isProcessing = true
      clearInterval(scanInterval)

      playBeep()

      confirmAttendance(best)
    }

  },700)
}

// ================= MATCH =================
function findBestMatch(query){
  let best=null

  knownFaces.forEach(face=>{
    const dist = faceapi.euclideanDistance(query, face.descriptor)
    if(!best || dist < best.distance){
      best={...face, distance:dist}
    }
  })

  return best
}

// ================= GPS =================
function getGPS(){
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(
      pos=>{
        resolve({
          lat:pos.coords.latitude,
          lng:pos.coords.longitude
        })
      },
      ()=>resolve({lat:"",lng:""}),
      { enableHighAccuracy:true, timeout:10000 }
    )
  })
}

// ================= DISTANCE =================
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3
  const toRad = x=>x*Math.PI/180

  const dLat = toRad(lat2-lat1)
  const dLon = toRad(lon2-lon1)

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ================= SOUND =================
function playBeep(){
  new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play().catch(()=>{})
}

// ================= CONFIRM =================
async function confirmAttendance(user){

  const type=document.getElementById("typeSelect").value
  const locationName=document.getElementById("locationSelect").value || "นอกสถานที่"

  const gps = await getGPS()
  const locationText = gps.lat+","+gps.lng

  const loc = locationsData.find(l=>l.name===locationName)

  if(loc && gps.lat){
    const dist = getDistance(gps.lat,gps.lng,loc.lat,loc.lng)

    if(dist > (loc.radius || 300)){
      alert("❌ อยู่นอกพื้นที่ ("+Math.round(dist)+"m)")
      isProcessing=false
      startScanLoop()
      return
    }
  }

  if(!confirm(`ยืนยัน ${type}\n${user.name}`)){
    isProcessing=false
    startScanLoop()
    return
  }

  await fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      action:"attendance",
      studentId:user.studentId,
      name:user.name,
      department:user.class,
      type:type,
      location:locationText,
      locationName:locationName
    })
  })

  alert("✅ บันทึกสำเร็จ")
  location.reload()
}
</script>

</body>
</html>
