<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตั้งค่า API</title>
</head>
<body style="font-family:sans-serif; padding:30px">

<h2>ตั้งค่า API</h2>

<input id="api" style="width:100%; padding:10px"
placeholder="https://script.google.com/macros/s/AKfycbz0BwFXCRmx-y7k1vUEhj5LMDumTpbXjpfqs5pl5x3P_phN4P10G1sS4jRtY0cibw4FOQ/exec">

<br><br>

<button onclick="save()">บันทึก</button>

<script>

function save(){
  const url = document.getElementById("api").value
  localStorage.setItem("gasApiUrl", url)
  alert("บันทึกแล้ว")
}

document.getElementById("api").value =
  localStorage.getItem("gasApiUrl") || ""

</script>

</body>
</html>
