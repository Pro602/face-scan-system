<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใบหน้า - THAISIAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .camera-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; background: #1e293b; border: 4px solid #334155; margin: 0 auto; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #334155; transition: all 0.3s; }
        .dot.active { background: #6366f1; transform: scale(1.3); box-shadow: 0 0 10px #6366f1; }
        .dot.done { background: #10b981; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <div class="flex items-center gap-4">
            <a href="<?= ScriptApp.getService().getUrl() ?>" class="p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition-colors">
                <i data-lucide="arrow-left"></i>
            </a>
            <h1 class="text-xl font-bold">ลงทะเบียนใบหน้า (5 มุม)</h1>
        </div>

        <!-- 🔐 ADMIN LOGIN (หน้ากากครอบถ้ายังไม่ได้ Login) -->
        <div id="loginBox" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 p-6" style="display:none;">
            <div class="glass-card w-full max-w-xs p-8 rounded-3xl space-y-4 text-center">
                <div class="w-16 h-16 bg-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="text-indigo-400 w-8 h-8"></i>
                </div>
                <h3 class="text-lg font-bold">Admin Login</h3>
                <input id="loginUser" type="text" placeholder="Username" class="w-full bg-slate-800 border-none rounded-xl p-3 text-white">
                <input id="loginPass" type="password" placeholder="Password" class="w-full bg-slate-800 border-none rounded-xl p-3 text-white">
                <button onclick="doLogin()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-500 transition-all">เข้าสู่ระบบ</button>
            </div>
        </div>

        <!-- กล้องและคำแนะนำ -->
        <div class="space-y-4 text-center">
            <div id="status" class="text-indigo-400 font-medium h-6">กำลังโหลด AI...</div>
            <div class="camera-container shadow-2xl shadow-indigo-500/10">
                <video id="video" autoplay muted playsinline></video>
                <div id="capture-overlay" class="absolute inset-0 border-[10px] border-indigo-500 opacity-0 transition-opacity pointer-events-none"></div>
            </div>
            <div class="step-indicator" id="step-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <!-- ฟอร์มข้อมูล -->
        <div class="glass-card p-6 rounded-3xl space-y-4 shadow-xl">
            <div class="space-y-3">
                <input id="studentId" placeholder="รหัสพนักงาน" class="w-full bg-slate-900/50 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                <input id="username" placeholder="ชื่อ-นามสกุล" class="w-full bg-slate-900/50 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                <input id="userClass" placeholder="แผนก / ฝ่าย" class="w-full bg-slate-900/50 border-none rounded-xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button id="btnSave" disabled onclick="startScanningSequence()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-600/20 active:scale-95 transition-all disabled:opacity-30">
                📸 เริ่มบันทึกใบหน้า 5 มุม
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const video = document.getElementById("video");
        const statusDiv = document.getElementById("status");
        const btnSave = document.getElementById("btnSave");
        const dots = document.querySelectorAll(".dot");
        let descriptors = [];
        let isCapturing = false;

        window.onload = () => {
            if (localStorage.getItem("isLogin") !== "true") {
                document.getElementById("loginBox").style.display = "flex";
            }
            initAI();
        };

        function doLogin() {
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            
            // ใช้ฟังก์ชัน login จาก code.gs โดยตรง
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    localStorage.setItem("isLogin", "true");
                    document.getElementById("loginBox").style.display = "none";
                } else {
                    alert("❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                }
            }).login({ user, pass });
        }

        async function initAI() {
            try {
                const MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                statusDiv.innerText = "AI พร้อมใช้งาน";
                startCamera();
                btnSave.disabled = false;
            } catch (e) {
                statusDiv.innerText = "❌ โหลด AI ไม่สำเร็จ";
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => { video.srcObject = stream; })
                .catch(err => { alert("❌ เปิดกล้องไม่ได้"); });
        }

        async function startScanningSequence() {
            const sid = document.getElementById("studentId").value.trim();
            const name = document.getElementById("username").value.trim();
            if (!sid || !name) return alert("กรุณากรอกข้อมูลให้ครบ");

            isCapturing = true;
            btnSave.disabled = true;
            descriptors = [];
            const steps = ["มองตรง", "หันซ้าย", "หันขวา", "เงยหน้าขึ้น", "ก้มหน้าลง"];

            for (let i = 0; i < steps.length; i++) {
                updateStepUI(i);
                statusDiv.innerText = `ขั้นตอนที่ ${i+1}: ${steps[i]}`;
                
                // ให้เวลาพนักงานขยับหน้า
                await new Promise(r => setTimeout(r, 2000));

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (!detection) {
                    alert(`❌ ไม่พบใบหน้าตอน ${steps[i]} กรุณาลองใหม่ตั้งแต่ต้น`);
                    resetUI();
                    return;
                }

                descriptors.push(Array.from(detection.descriptor));
                flashOverlay();
                dots[i].classList.add('done');
            }

            statusDiv.innerText = "⏳ กำลังบันทึกข้อมูลลงระบบ...";
            saveToDatabase(sid, name);
        }

        function saveToDatabase(sid, name) {
            const userClass = document.getElementById("userClass").value.trim();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.8);

            const payload = {
                id: sid,
                name: name,
                department: userClass,
                image: base64,
                descriptor: descriptors // ส่งเป็น Array ของ 5 ชุด
            };

            google.script.run.withSuccessHandler(res => {
                alert("✅ ลงทะเบียนสำเร็จเรียบร้อย");
                window.location.reload();
            }).registerNewEmployee(payload);
        }

        function updateStepUI(index) {
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function flashOverlay() {
            const overlay = document.getElementById('capture-overlay');
            overlay.style.opacity = '1';
            setTimeout(() => overlay.style.opacity = '0', 200);
        }

        function resetUI() {
            isCapturing = false;
            btnSave.disabled = false;
            dots.forEach(dot => dot.classList.remove('active', 'done'));
            statusDiv.innerText = "AI พร้อมใช้งาน";
        }
    </script>
</body>
</html>
