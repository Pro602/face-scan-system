<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ลงทะเบียนใบหน้า</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:30px
}
video{
  width:100%;
  max-width:400px;
  border-radius:12px;
  margin-bottom:20px;
  transform:scaleX(-1)
}
input{
  width:100%;
  max-width:350px;
  padding:12px;
  margin:8px;
  border-radius:8px;
  border:none
}
button{
  padding:14px 25px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  font-size:16px;
  cursor:pointer
}
#status{ margin-bottom:10px }

#loginBox{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#000d;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}
</style>

</head>

<body>

<h2>ลงทะเบียนใบหน้า</h2>

<div id="status">กำลังโหลด AI...</div>

<!-- 🔐 LOGIN -->
<div id="loginBox" style="display:none;">
  <h3>🔐 Admin Login</h3>
  <input id="loginUser" placeholder="User">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="doLogin()">เข้าสู่ระบบ</button>
</div>

<video id="video" autoplay muted playsinline></video>

<br>

<input id="studentId" placeholder="รหัสพนักงาน">
<input id="username" placeholder="ชื่อ-นามสกุล">
<input id="userClass" placeholder="แผนก">

<br>

<button id="btnSave" disabled onclick="saveFace()">
📸 บันทึกใบหน้า
</button>

<p id="msg"></p>

<script>

// ================= CONFIG =================
const API_URL = localStorage.getItem("gasApiUrl") || (typeof GAS_API_URL !== "undefined" ? GAS_API_URL : "")

if(!API_URL){
  alert("❌ ยังไม่ได้ตั้งค่า API")
}

// ================= ELEMENT =================
const video = document.getElementById("video")
const statusDiv = document.getElementById("status")
const btnSave = document.getElementById("btnSave")
const msgDiv = document.getElementById("msg")
let descriptors = []

// ================= LOGIN =================
window.onload = () => {

  if(localStorage.getItem("isLogin") !== "true"){
    document.getElementById("loginBox").style.display="flex"
  }

  init()
}

async function doLogin(){

  const user = document.getElementById("loginUser").value
  const pass = document.getElementById("loginPass").value

  try{

    const res = await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",   // ⭐ สำคัญ
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        action:"login",
        user:user,
        pass:pass
      })
    })

    // ⭐ no-cors → อ่าน response ไม่ได้
    localStorage.setItem("isLogin","true")
    document.getElementById("loginBox").style.display="none"

  }catch(e){
    alert("❌ เชื่อมต่อ server ไม่ได้")
  }
}

// ================= INIT AI =================
async function init(){

  try{

    statusDiv.innerText="กำลังโหลด AI..."

    const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)

    statusDiv.innerText="AI พร้อมใช้งาน"

    startCamera()
    btnSave.disabled=false

  }catch(e){

    console.error(e)
    statusDiv.innerText="❌ โหลด AI ไม่สำเร็จ"

  }
}

// ================= CAMERA =================
function startCamera(){

  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"user" }
  })
  .then(stream=>{
    video.srcObject=stream
  })
  .catch(err=>{
    console.log(err)
    alert("❌ เปิดกล้องไม่ได้")
  })
}

  async function captureAverageDescriptor(){

  const descriptors = []

  for(let i=0;i<10;i++){

    statusDiv.innerText =
      "📸 กำลังเก็บข้อมูลใบหน้า... " + (i+1) + "/10"

    const det = await faceapi
      .detectSingleFace(
        video,
        new faceapi.TinyFaceDetectorOptions()
      )
      .withFaceLandmarks()
      .withFaceDescriptor()

    if(det){

      // กันภาพไม่ชัด
      if(det.detection.score < 0.8){
        continue
      }

      // กันหน้าไกลเกิน
      if(det.detection.box.width < 120){
        continue
      }

      descriptors.push(det.descriptor)
    }

    await new Promise(r=>setTimeout(r,100))
  }

  if(descriptors.length < 5){
    return null
  }

  // average descriptor
  const avg = new Float32Array(descriptors[0].length)

  descriptors.forEach(d=>{

    for(let i=0;i<d.length;i++){
      avg[i]+=d[i]
    }

  })

  for(let i=0;i<avg.length;i++){
    avg[i]/=descriptors.length
  }

  return Array.from(avg)
}
// ================= SAVE FACE =================

async function saveFace(){

  const studentId =
    document.getElementById("studentId").value.trim()

  const name =
    document.getElementById("username").value.trim()

  const userClass =
    document.getElementById("userClass").value.trim()

  if(!studentId || !name || !userClass){
    alert("กรอกข้อมูลให้ครบ")
    return
  }

  statusDiv.innerText =
    "📸 กรุณามองกล้องนิ่ง ๆ 2 วินาที"

  const finalDescriptor =
    await captureAverageDescriptor()

  if(!finalDescriptor){

    alert(
      "❌ ตรวจจับใบหน้าไม่ได้\nกรุณาอยู่ในที่สว่าง"
    )

    return
  }

  try{

    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({

        action:"registerUser",

        studentId:studentId,
        name:name,
        studentClass:userClass,

        faceDescriptor: finalDescriptor

      })
    })

    msgDiv.innerText =
      "✅ ลงทะเบียนสำเร็จ"

    statusDiv.innerText =
      "✅ บันทึกใบหน้าเรียบร้อย"

  }catch(e){

    console.error(e)

    msgDiv.innerText =
      "❌ error"

  }
}
</script>

</body>
</html>
