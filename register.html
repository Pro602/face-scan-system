<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ลงทะเบียนใบหน้า</title>

<script src="api-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:30px
}

video{
width:100%;
max-width:400px;
border-radius:12px;
margin-bottom:20px;
transform:scaleX(-1)
}

input{
width:100%;
max-width:350px;
padding:12px;
margin:8px;
border-radius:8px;
border:none
}

button{
padding:14px 25px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer
}

button:disabled{
background:#555
}

#status{
margin-bottom:10px
}

</style>

</head>

<body>

<h2>ลงทะเบียนใบหน้า</h2>

<div id="status">กำลังโหลด AI...</div>

<video id="video" autoplay muted playsinline></video>

<br>

<input id="studentId" placeholder="รหัสพนักงาน">
<br>
<input id="username" placeholder="ชื่อ-นามสกุล">
<br>
<input id="userClass" placeholder="แผนก">

<br><br>

<button type="button" id="btnSave" disabled onclick="saveFace()">
📸 บันทึกใบหน้า
</button>

<p id="msg"></p>

<script>

const API_URL = localStorage.getItem("gasApiUrl") || GAS_API_URL

const video = document.getElementById("video")
const statusDiv = document.getElementById("status")
const btnSave = document.getElementById("btnSave")
const msgDiv = document.getElementById("msg")

async function init(){

try{

statusDiv.innerText="กำลังโหลด AI Model..."

const MODEL_URL="https://justadudewhohacks.github.io/face-api.js/models"

await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)

statusDiv.innerText="AI พร้อมใช้งาน"

startCamera()

btnSave.disabled=false

}catch(e){

console.error(e)

statusDiv.innerText="โหลด AI ไม่สำเร็จ"

}

}

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})

.then(stream=>{
video.srcObject=stream
})

.catch(err=>{
console.log(err)
})

}

async function saveFace(){

  const studentId=document.getElementById("studentId").value.trim()
  const name=document.getElementById("username").value.trim()
  const userClass=document.getElementById("userClass").value.trim()

  if(!studentId||!name||!userClass){
    alert("กรอกข้อมูลให้ครบ")
    return
  }

  msgDiv.innerText="กำลังสแกนใบหน้า..."

  const detection=await faceapi
    .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceDescriptor()

  if(!detection){
    alert("ไม่พบใบหน้า")
    return
  }

  const descriptor=Array.from(detection.descriptor)

  try{

    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",   // ⭐ สำคัญมาก
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        action:"registerUser",
        studentId:studentId,
        name:name,
        studentClass:userClass,
        faceDescriptor:descriptor
      })
    })

    // ⭐ no-cors อ่าน response ไม่ได้ → ถือว่าสำเร็จ
    msgDiv.innerText="บันทึกสำเร็จ"

  }catch(e){

    console.error(e)
    msgDiv.innerText="บันทึกไม่สำเร็จ"

  }
}

window.onload=init

</script>

</body>
</html>
