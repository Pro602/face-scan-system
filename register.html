<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใบหน้า - THAISIAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ใช้ face-api.js รุ่นที่เสถียรที่สุดสำหรับ browser -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .camera-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 2rem; overflow: hidden; background: #1e293b; border: 4px solid #334155; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #334155; transition: all 0.3s; }
        .dot.active { background: #6366f1; transform: scale(1.3); box-shadow: 0 0 15px #6366f1; }
        .dot.done { background: #10b981; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition-colors">
                    <i data-lucide="arrow-left"></i>
                </a>
                <h1 class="text-xl font-bold">ลงทะเบียนพนักงาน</h1>
            </div>
            <a href="config.html" class="p-2 text-slate-400 hover:text-white">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </a>
        </div>

        <div class="space-y-4 text-center">
            <div id="status" class="text-indigo-400 font-medium h-6 text-sm flex items-center justify-center gap-2">
                <div class="w-3 h-3 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                กำลังเตรียมระบบ AI...
            </div>
            <div class="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <div id="scan-line" class="absolute inset-x-0 top-0 h-1 bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.8)] opacity-0 transition-all duration-500"></div>
            </div>
            <div class="flex justify-center gap-3" id="step-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem] space-y-4 shadow-2xl border-white/5">
            <div class="space-y-3">
                <div class="relative">
                    <i data-lucide="fingerprint" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input id="empId" type="text" placeholder="รหัสพนักงาน (เช่น 66001)" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-4 pl-12 outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                    <input id="empName" type="text" placeholder="ชื่อ-นามสกุล" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-4 pl-12 outline-none focus:border-indigo-500 transition-all">
                </div>
            </div>
            <button id="btnStart" disabled onclick="runFaceCapture()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold disabled:opacity-20 shadow-xl shadow-indigo-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                <i data-lucide="camera"></i>
                เริ่มสแกนใบหน้า (5 มุม)
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const API_URL = localStorage.getItem("gasApiUrl");
        const video = document.getElementById("video");
        const statusDiv = document.getElementById("status");
        const btnStart = document.getElementById("btnStart");
        const dots = document.querySelectorAll(".dot");
        let faceDescriptors = [];

        window.onload = async () => {
            // โหลด AI ทันทีเมื่อเปิดหน้า
            await initFaceAI();
        };

        async function initFaceAI() {
            try {
                // แก้ไข Path โมเดลใหม่ โดยดึงจาก Repository ที่รวบรวมโมเดล face-api ไว้โดยเฉพาะ
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
                
                statusDiv.innerHTML = `<div class="w-3 h-3 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div> กำลังโหลดโมเดลจาก Server...`;
                
                // โหลดเฉพาะที่จำเป็นเพื่อความเร็ว
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 640, facingMode: "user" } 
                });
                video.srcObject = stream;
                
                statusDiv.innerHTML = `<span class="text-emerald-400">✅ ระบบพร้อมสแกนใบหน้า</span>`;
                btnStart.disabled = false;
            } catch (e) {
                console.error("AI Error:", e);
                statusDiv.innerHTML = `<span class="text-rose-500 font-bold">❌ เกิดข้อผิดพลาด: ไม่สามารถโหลดโมเดลได้</span>`;
                // แสดงสาเหตุใน console เพื่อช่วย debug
            }
        }

        async function runFaceCapture() {
            const id = document.getElementById("empId").value;
            const name = document.getElementById("empName").value;
            if(!id || !name) return alert("กรุณากรอกรหัสและชื่อพนักงาน");

            btnStart.disabled = true;
            faceDescriptors = [];
            const labels = ["มองตรง", "หันซ้าย", "หันขวา", "เงยหน้า", "ก้มหน้า"];
            const scanLine = document.getElementById("scan-line");

            for (let i = 0; i < 5; i++) {
                statusDiv.innerHTML = `<span class="text-indigo-400 animate-pulse">📸 ท่าที่ ${i+1}: ${labels[i]}</span>`;
                dots[i].classList.add("active");
                
                // เลื่อนเส้นสแกนหลอกๆ เพื่อ UX
                scanLine.style.top = "0%";
                scanLine.classList.add("opacity-100");
                setTimeout(() => scanLine.style.top = "100%", 100);

                await new Promise(r => setTimeout(r, 1500));

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detection) {
                    faceDescriptors.push(Array.from(detection.descriptor));
                    dots[i].classList.replace("active", "done");
                    scanLine.classList.remove("opacity-100");
                } else {
                    statusDiv.innerHTML = `<span class="text-rose-400">⚠️ ไม่ชัดเจน! พยายามจ้องที่กล้อง</span>`;
                    i--; 
                    dots[i+1].classList.remove("active");
                    await new Promise(r => setTimeout(r, 1500));
                }
            }

            finalizeRegistration(id, name);
        }

        async function finalizeRegistration(id, name) {
            if (!API_URL) {
                alert("บันทึกไม่สำเร็จ: ยังไม่ได้ตั้งค่า API URL ในหน้า Config");
                btnStart.disabled = false;
                return;
            }

            statusDiv.innerHTML = `<div class="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></div> กำลังส่งข้อมูลไปยัง Google Sheets...`;
            
            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 320;
            const ctx = canvas.getContext('2d');
            ctx.translate(320, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 320, 320);

            const formData = new URLSearchParams();
            formData.append('action', 'registerFace');
            formData.append('empId', id);
            formData.append('empName', name);
            formData.append('img', canvas.toDataURL('image/jpeg', 0.6));
            formData.append('descriptors', JSON.stringify(faceDescriptors));

            try {
                // ใช้ fetch แบบส่งข้อมูลผ่าน URLSearchParams เพื่อเลี่ยงปัญหา CORS กับ Google Apps Script
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                statusDiv.innerHTML = `<span class="text-emerald-400 text-lg font-bold">🎉 บันทึกสำเร็จ!</span>`;
                setTimeout(() => window.location.href = "index.html", 2500);
            } catch (e) {
                console.error("Submit Error:", e);
                statusDiv.innerHTML = `<span class="text-rose-400">❌ ส่งข้อมูลล้มเหลว</span>`;
                btnStart.disabled = false;
            }
        }
    </script>
</body>
</html>
