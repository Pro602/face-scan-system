<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใบหน้า - THAISIAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; text-align: center; }
        .camera-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 2rem; overflow: hidden; background: #1e293b; border: 4px solid #334155; margin: 20px auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        input { width: 100%; max-width: 350px; padding: 14px; margin: 8px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; transition: all 0.2s; }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        button { padding: 14px 25px; border: none; border-radius: 12px; background: #6366f1; color: white; font-size: 16px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 4px 16px; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); color: #818cf8; font-size: 0.875rem; margin-bottom: 10px; border-radius: 99px; }
        #loginBox { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-bold mb-2">ระบบลงทะเบียนพนักงาน</h2>
        <div id="status" class="status-badge">กำลังเตรียมระบบ AI...</div>

        <!-- 🔐 LOGIN (Admin Only) -->
        <div id="loginBox" style="display:none;">
            <div class="bg-slate-800 p-8 rounded-[2rem] border border-white/5 w-[90%] max-w-sm shadow-2xl text-center">
                <i data-lucide="shield-check" class="w-12 h-12 text-indigo-500 mx-auto mb-4"></i>
                <h3 class="text-xl font-bold mb-6 text-white">Admin Authentication</h3>
                <input id="loginUser" placeholder="Username">
                <input id="loginPass" type="password" placeholder="Password">
                <button onclick="doLogin()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500">เข้าสู่ระบบ</button>
            </div>
        </div>

        <!-- Camera Area -->
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
        </div>

        <!-- Inputs Area -->
        <div class="space-y-1 mb-6 text-left max-w-[350px] mx-auto">
            <label class="text-xs text-slate-500 ml-2">ข้อมูลพนักงาน</label>
            <input id="studentId" placeholder="รหัสพนักงาน (Student ID)">
            <input id="username" placeholder="ชื่อ - นามสกุล">
            <input id="userClass" placeholder="แผนก / ตำแหน่ง">
        </div>

        <button id="btnSave" disabled onclick="saveFace()" class="w-full max-w-[350px] flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20">
            <i data-lucide="scan-face"></i>
            บันทึกใบหน้า 5 ทิศทาง
        </button>

        <div id="msg" class="mt-6 text-sm min-h-[20px]"></div>
    </div>

    <script>
        lucide.createIcons();

        // ================= CONFIG =================
        // ดึง URL จาก localStorage หรือ api-config.js
        const API_URL = localStorage.getItem("gasApiUrl") || (typeof GAS_API_URL !== "undefined" ? GAS_API_URL : "");

        const video = document.getElementById("video");
        const statusDiv = document.getElementById("status");
        const btnSave = document.getElementById("btnSave");
        const msgDiv = document.getElementById("msg");
        let faceDescriptors = []; // สำหรับเก็บทั้ง 5 มุม

        // ================= INITIALIZE =================
        window.onload = () => {
            if(localStorage.getItem("isLogin") !== "true"){
                document.getElementById("loginBox").style.display="flex";
            }
            initAI();
        }

        async function doLogin(){
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            
            // ใช้การตรวจสอบเบื้องต้นเพื่อเข้าหน้าลงทะเบียน
            if(user === "admin" && pass !== "") {
                localStorage.setItem("isLogin", "true");
                document.getElementById("loginBox").style.display = "none";
            } else {
                alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
            }
        }

        async function initAI(){
            try {
                statusDiv.innerHTML = `<span class="animate-pulse">กำลังโหลด AI...</span>`;
                // Path โมเดลที่เสถียรที่สุด
                const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";

                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                statusDiv.innerHTML = `<span class="text-emerald-400">✅ ระบบ AI พร้อมใช้งาน</span>`;
                startCamera();
                btnSave.disabled = false;
            } catch (e) {
                console.error(e);
                statusDiv.innerHTML = `<span class="text-rose-500">❌ โหลด AI ล้มเหลว</span>`;
            }
        }

        function startCamera(){
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("❌ เปิดกล้องไม่ได้: " + err.message); });
        }

        // ================= MAIN LOGIC (ส่ง 5 มุมสอดคล้องกับ code.gs) =================
        async function saveFace(){
            const studentId = document.getElementById("studentId").value.trim();
            const name = document.getElementById("username").value.trim();
            const userClass = document.getElementById("userClass").value.trim();

            if(!studentId || !name || !userClass){
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            if(!API_URL){
                alert("ยังไม่ได้ตั้งค่า API URL");
                return;
            }

            btnSave.disabled = true;
            faceDescriptors = []; // ล้างค่าเก่า
            const steps = ["มองตรง", "หันซ้าย", "หันขวา", "เงยหน้า", "ก้มหน้า"];

            for(let i=0; i<steps.length; i++){
                statusDiv.innerHTML = `<span class="text-indigo-400 animate-bounce">👉 ขั้นตอนที่ ${i+1}: ${steps[i]}</span>`;
                msgDiv.innerText = `เตรียมตัว... ${steps[i]}`;
                
                // รอให้ผู้ใช้เปลี่ยนท่าทาง
                await new Promise(r => setTimeout(r, 2500));

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if(!detection){
                    alert(`❌ ไม่พบใบหน้าในท่า "${steps[i]}" กรุณาลองใหม่อีกครั้ง`);
                    btnSave.disabled = false;
                    statusDiv.innerHTML = `<span class="text-emerald-400">✅ พร้อมใช้งาน</span>`;
                    return;
                }

                // เก็บค่าเวกเตอร์ (Float32Array -> Array)
                faceDescriptors.push(Array.from(detection.descriptor));
                msgDiv.innerHTML = `<span class="text-emerald-400">บันทึก ${steps[i]} เรียบร้อย...</span>`;
            }

            // ส่งข้อมูลไปยัง Backend (Google Apps Script)
            try {
                statusDiv.innerHTML = `<span class="animate-pulse">กำลังบันทึกลง Google Sheets...</span>`;
                
                // เตรียมข้อมูลส่งแบบ no-cors (JSON string)
                // หมายเหตุ: code.gs ใหม่รองรับ JSON.stringify(faceData) โดยที่ faceData เป็น Array (5 มุม)
                const payload = {
                    action: "registerUser",
                    studentId: studentId,
                    name: name,
                    studentClass: userClass,
                    faceDescriptor: faceDescriptors // ส่ง Array ของทั้ง 5 มุมไปเลย (ไม่ใช่แค่ค่าเฉลี่ย)
                };

                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                msgDiv.innerHTML = `
                    <div class="bg-emerald-500/20 text-emerald-400 p-4 rounded-xl border border-emerald-500/30">
                        <p class="font-bold">✅ ลงทะเบียนสำเร็จ!</p>
                        <p class="text-xs opacity-80">บันทึกข้อมูลใบหน้า 5 มุมเรียบร้อยแล้ว</p>
                    </div>
                `;
                statusDiv.innerHTML = `<span class="text-emerald-400">🎉 เสร็จสมบูรณ์</span>`;
                
                // ล้างค่าฟอร์ม
                document.getElementById("studentId").value = "";
                document.getElementById("username").value = "";
                document.getElementById("userClass").value = "";
                
                setTimeout(() => { btnSave.disabled = false; }, 3000);

            } catch (e) {
                console.error(e);
                msgDiv.innerHTML = `<span class="text-rose-400">❌ เกิดข้อผิดพลาดในการเชื่อมต่อ</span>`;
                btnSave.disabled = false;
            }
        }
    </script>
</body>
</html>
