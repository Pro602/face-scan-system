<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนพนักงาน - THAISIAM FaceScan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า api-config.js เพื่อดึงค่า GAS_API_URL -->
    <script src="api-config.js"></script>
    <!-- ใช้ face-api.js เวอร์ชันเสถียร -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .camera-box { position: relative; width: 100%; max-width: 360px; aspect-ratio: 1/1; border-radius: 2rem; overflow: hidden; background: #1e293b; border: 4px solid #334155; margin: 0 auto; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #334155; transition: all 0.3s; }
        .dot.active { background: #6366f1; transform: scale(1.4); box-shadow: 0 0 10px #6366f1; }
        .dot.done { background: #10b981; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <!-- 🔐 Login Overlay (สิทธิ์เฉพาะผู้ดูแล) -->
    <div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/95 p-6 transition-opacity duration-500">
        <div class="glass-card w-full max-w-sm p-8 rounded-[2.5rem] text-center border-indigo-500/30 shadow-2xl">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="text-indigo-400 w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">สิทธิ์เฉพาะผู้ดูแล</h2>
            <p class="text-slate-400 text-sm mb-6">กรุณายืนยันตัวตนเพื่อเข้าถึงหน้านี้</p>
            
            <div class="space-y-4 mb-6">
                <input id="admUser" type="text" placeholder="Username" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:ring-2 ring-indigo-500">
                <input id="admPass" type="password" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 outline-none focus:ring-2 ring-indigo-500">
            </div>
            
            <button onclick="handleLogin()" id="btnLogin" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-900/20 active:scale-95 transition-all">
                เข้าสู่ระบบ
            </button>
        </div>
    </div>

    <div class="w-full max-w-md space-y-6">
        <div class="flex items-center gap-4 mb-2">
            <a href="index.html" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-2xl transition-colors">
                <i data-lucide="chevron-left"></i>
            </a>
            <h1 class="text-2xl font-bold">ลงทะเบียนใบหน้า</h1>
        </div>

        <div class="text-center space-y-4">
            <div id="aiStatus" class="text-sm font-medium flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-ping"></span>
                <span id="statusText">กำลังเตรียมระบบ AI...</span>
            </div>

            <div class="camera-box shadow-2xl">
                <video id="video" autoplay muted playsinline></video>
                <div id="flash" class="absolute inset-0 bg-white opacity-0 pointer-events-none transition-opacity duration-150"></div>
            </div>

            <div class="flex justify-center gap-3" id="steps">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="glass-card p-6 rounded-[2rem] space-y-4">
            <div class="space-y-3">
                <input id="empId" type="text" placeholder="รหัสพนักงาน (เช่น 660123)" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 outline-none focus:border-indigo-500">
                <input id="empName" type="text" placeholder="ชื่อ-นามสกุล" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 outline-none focus:border-indigo-500">
                <input id="empDept" type="text" placeholder="แผนก/ฝ่าย" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 outline-none focus:border-indigo-500">
            </div>

            <button id="btnStart" disabled onclick="startCapture()" class="w-full bg-indigo-600 disabled:opacity-30 py-4 rounded-xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                📸 เริ่มบันทึก 5 มุมมอง
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const btnStart = document.getElementById('btnStart');
        const dots = document.querySelectorAll('.dot');
        let faceDescriptors = [];

        // ฟังก์ชันส่งข้อมูลผ่าน Fetch API (สำหรับ GitHub -> GAS)
        async function callApi(payload) {
            try {
                // ดึง GAS_API_URL จาก api-config.js
                if (typeof GAS_API_URL === 'undefined' || !GAS_API_URL) {
                    throw new Error("ไม่พบ URL ของ API ในระบบ");
                }
                
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญ: ป้องกันปัญหา CORS เบื้องต้น
                    body: JSON.stringify(payload)
                });
                
                // หมายเหตุ: mode 'no-cors' จะทำให้อ่าน response ไม่ได้ 
                // แต่ข้อมูลจะถูกส่งไปถึง GAS แน่นอน 
                // หากต้องการอ่านค่ากลับ ต้องตั้งค่าใน GAS ให้รองรับ CORS
                return { success: true }; 
            } catch (e) {
                console.error("API Error:", e);
                return { success: false, message: e.message };
            }
        }

        async function handleLogin() {
            const user = document.getElementById('admUser').value;
            const pass = document.getElementById('admPass').value;
            const btn = document.getElementById('btnLogin');

            if (!user || !pass) return alert("กรุณากรอกข้อมูล");
            
            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;

            // ในที่นี้สมมติว่าถ้าผ่าน (หรือคุณจะส่งเช็คกับ GAS ก็ได้)
            // สำหรับตัวอย่างนี้ผมอนุญาตให้ผ่านถ้ามีข้อมูล
            setTimeout(() => {
                document.getElementById('loginOverlay').classList.add('opacity-0');
                setTimeout(() => document.getElementById('loginOverlay').style.display = 'none', 500);
                initAI();
            }, 1000);
        }

        async function initAI() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
                statusText.innerText = "กำลังโหลด Model...";
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                statusText.innerText = "✅ พร้อมบันทึกใบหน้า";
                btnStart.disabled = false;
            } catch (e) {
                statusText.innerHTML = `<span class="text-rose-500">❌ เกิดข้อผิดพลาด: ${e.message}</span>`;
            }
        }

        async function startCapture() {
            const id = document.getElementById('empId').value;
            const name = document.getElementById('empName').value;
            if(!id || !name) return alert("กรุณากรอกรหัสและชื่อพนักงาน");

            btnStart.disabled = true;
            faceDescriptors = [];
            const labels = ["มองตรง", "หันซ้าย", "หันขวา", "เงยหน้า", "ก้มหน้า"];

            for(let i=0; i<5; i++) {
                statusText.innerText = `ขั้นตอนที่ ${i+1}: ${labels[i]}`;
                dots[i].classList.add('active');
                
                await new Promise(r => setTimeout(r, 2000));

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if(detection) {
                    faceDescriptors.push(Array.from(detection.descriptor));
                    triggerFlash();
                    dots[i].classList.remove('active');
                    dots[i].classList.add('done');
                } else {
                    statusText.innerText = `❌ ไม่พบใบหน้า (ลองอีกครั้ง)`;
                    i--; // ทำซ้ำท่าเดิม
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
            uploadData(id, name);
        }

        function triggerFlash() {
            const f = document.getElementById('flash');
            f.style.opacity = "1";
            setTimeout(() => f.style.opacity = "0", 150);
        }

        async function uploadData(id, name) {
            statusText.innerText = "⏳ กำลังส่งข้อมูลไปยัง Google Sheets...";
            const dept = document.getElementById('empDept').value || "-";

            const payload = {
                action: 'register',
                empId: id,
                name: name,
                dept: dept,
                descriptors: JSON.stringify(faceDescriptors)
            };

            const res = await callApi(payload);
            if(res.success) {
                statusText.innerHTML = "<span class='text-emerald-400'>✅ ลงทะเบียนสำเร็จ! กำลังกลับหน้าหลัก...</span>";
                setTimeout(() => window.location.href = "index.html", 3000);
            } else {
                alert("เกิดข้อผิดพลาด: " + res.message);
                btnStart.disabled = false;
            }
        }
    </script>
</body>
</html>
