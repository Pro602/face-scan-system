<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนพนักงานใหม่ - THAISIAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ใช้ CDN สำรองที่เสถียรกว่าสำหรับ face-api -->
    <script src="https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .camera-box { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 2rem; overflow: hidden; border: 4px solid #334155; margin: 0 auto; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        input { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        input:focus { border-color: #6366f1 !important; ring: 2px #6366f1; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; transition: all 0.3s; }
        .step-dot.active { background: #6366f1; transform: scale(1.5); }
        #loginOverlay { position: fixed; inset: 0; z-index: 1000; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 🔐 Login Overlay (เหมือนรูปที่ 3-4) -->
    <div id="loginOverlay">
        <div class="glass-panel p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <div class="w-16 h-16 bg-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="text-indigo-400 w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">สิทธิ์เฉพาะผู้ดูแล</h2>
            <p class="text-slate-400 text-sm mb-8">กรุณาเข้าสู่ระบบเพื่อลงทะเบียนพนักงาน</p>
            
            <div class="space-y-4">
                <input type="text" id="admUser" placeholder="ชื่อผู้ใช้งาน" class="w-full p-4 rounded-xl outline-none">
                <input type="password" id="admPass" placeholder="รหัสผ่าน" class="w-full p-4 rounded-xl outline-none">
                <button onclick="checkAdmin()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-bold transition-all mt-4">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-lg mt-8">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="location.reload()" class="p-2 hover:bg-slate-800 rounded-full transition-colors">
                <i data-lucide="arrow-left"></i>
            </button>
            <h1 class="text-xl font-semibold">ลงทะเบียนใบหน้า (5 มุม)</h1>
        </div>

        <div id="statusLabel" class="text-center mb-4 flex items-center justify-center gap-2 text-rose-400">
            <i data-lucide="loader-2" class="animate-spin w-4 h-4"></i>
            <span>กำลังเตรียมระบบ AI...</span>
        </div>

        <div class="camera-box mb-6 shadow-2xl shadow-indigo-500/10">
            <video id="video" autoplay muted playsinline></video>
            <!-- Overlay Guide -->
            <div class="absolute inset-0 border-[40px] border-black/40 pointer-events-none"></div>
        </div>

        <!-- Step Indicator -->
        <div class="flex justify-center gap-3 mb-8" id="stepDots">
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <div class="glass-panel p-6 rounded-[2rem] space-y-4">
            <div class="space-y-2">
                <label class="text-xs text-slate-400 ml-1">ข้อมูลพนักงาน</label>
                <input id="sid" type="text" placeholder="รหัสพนักงาน (เช่น 660123)" class="w-full p-4 rounded-xl outline-none text-sm">
                <input id="sname" type="text" placeholder="ชื่อ-นามสกุล" class="w-full p-4 rounded-xl outline-none text-sm">
                <input id="sclass" type="text" placeholder="แผนก / ตำแหน่ง" class="w-full p-4 rounded-xl outline-none text-sm">
            </div>

            <button id="startBtn" onclick="startRegistration()" disabled class="w-full bg-indigo-600 disabled:bg-slate-700 p-4 rounded-xl font-bold flex items-center justify-center gap-2">
                <i data-lucide="scan"></i>
                เริ่มบันทึกใบหน้า 5 ทิศทาง
            </button>
        </div>

        <p id="msgText" class="text-center mt-6 text-sm text-slate-400"></p>
    </div>

    <script>
        lucide.createIcons();
        
        // ดึง URL จาก localStorage (ให้ตั้งค่าในหน้า Settings ก่อน)
        const API_URL = localStorage.getItem("gasApiUrl");
        const video = document.getElementById('video');
        let capturedProfiles = [];

        // 1. ตรวจสอบการ Login
        function checkAdmin() {
            const u = document.getElementById('admUser').value;
            const p = document.getElementById('admPass').value;
            if(u === "admin" && p !== "") { // แก้ไขรหัสผ่านตามต้องการ
                document.getElementById('loginOverlay').style.display = 'none';
                initAI();
            } else {
                alert("สิทธิ์ไม่ถูกต้อง");
            }
        }

        // 2. โหลด AI Models (แก้ไข Path ให้เสถียร)
        async function initAI() {
            const statusLabel = document.getElementById('statusLabel');
            try {
                // ใช้โมเดลจาก GitHub แทน jsdelivr เพื่อเลี่ยง Error 404
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                statusLabel.innerHTML = `<span class="text-emerald-400">✅ ระบบ AI พร้อมทำงาน</span>`;
                statusLabel.classList.remove('text-rose-400');
                
                startCamera();
                document.getElementById('startBtn').disabled = false;
            } catch (err) {
                console.error(err);
                statusLabel.innerHTML = `<span class="text-rose-500">❌ โหลดโมเดลล้มเหลว: ${err.message}</span>`;
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(s => video.srcObject = s)
                .catch(e => alert("เข้าถึงกล้องไม่ได้: " + e));
        }

        // 3. เริ่มขั้นตอนบันทึก 5 มุม (สอดคล้องกับ code.gs)
        async function startRegistration() {
            const sid = document.getElementById('sid').value;
            const name = document.getElementById('sname').value;
            const sclass = document.getElementById('sclass').value;

            if(!sid || !name || !sclass) return alert("กรุณากรอกข้อมูลให้ครบ");
            if(!API_URL) return alert("กรุณาตั้งค่า API URL ในหน้า Dashboard ก่อน");

            const btn = document.getElementById('startBtn');
            const dots = document.querySelectorAll('.step-dot');
            const msg = document.getElementById('msgText');
            const steps = ["มองตรง", "หันซ้าย", "หันขวา", "เงยหน้า", "ก้มหน้า"];
            
            btn.disabled = true;
            capturedProfiles = [];

            for(let i=0; i<steps.length; i++) {
                msg.innerHTML = `<span class="text-indigo-400 font-bold">ขั้นตอนที่ ${i+1}: ${steps[i]}</span><br>กรุณาค้างไว้ 2 วินาที...`;
                dots[i].classList.add('active');

                await new Promise(r => setTimeout(r, 2000));

                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if(!detection) {
                    alert(`ไม่พบใบหน้าขณะ "${steps[i]}" กรุณาลองใหม่`);
                    location.reload();
                    return;
                }

                capturedProfiles.push(Array.from(detection.descriptor));
                msg.innerHTML = `✅ บันทึกมุม ${steps[i]} สำเร็จ!`;
            }

            // 4. ส่งข้อมูลไปยัง Google Sheets (code.gs)
            msg.innerHTML = `<span class="animate-pulse">กำลังส่งข้อมูลไปยังฐานข้อมูล...</span>`;
            
            const payload = {
                action: "registerUser",
                studentId: sid,
                name: name,
                studentClass: sclass,
                faceDescriptor: capturedProfiles // ส่ง Array ของทั้ง 5 เวกเตอร์
            };

            try {
                // ใช้ no-cors เพราะเป็น GAS
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                msg.innerHTML = `<div class="p-4 bg-emerald-500/20 text-emerald-400 rounded-2xl border border-emerald-500/30">
                    🎉 ลงทะเบียนเรียบร้อยแล้ว!<br>พนักงานคนนี้สามารถใช้ใบหน้าสแกนเข้างานได้ทันที
                </div>`;
                
                // ล้างค่า
                document.getElementById('sid').value = "";
                document.getElementById('sname').value = "";
                document.getElementById('sclass').value = "";
                setTimeout(() => location.reload(), 4000);

            } catch (err) {
                msg.innerHTML = `<span class="text-rose-500">❌ ส่งข้อมูลล้มเหลว: ${err.message}</span>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
