<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใบหน้า - THAISIAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ใช้ CDN ของ vladmandic สำหรับ face-api ที่เสถียรที่สุดบนเว็บ -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .camera-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; border-radius: 30px; overflow: hidden; background: #1e293b; border: 4px solid #334155; margin: 0 auto; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #334155; transition: all 0.3s; }
        .dot.active { background: #6366f1; transform: scale(1.3); box-shadow: 0 0 10px #6366f1; }
        .dot.done { background: #10b981; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .flash-active { animation: flash 0.3s ease-out; }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <div class="flex items-center gap-4">
            <button onclick="window.top.location.href='<?= ScriptApp.getService().getUrl() ?>'" class="p-2 bg-slate-800 rounded-full">
                <i data-lucide="arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold">ลงทะเบียนพนักงานใหม่</h1>
        </div>

        <!-- 🔐 ADMIN LOGIN -->
        <div id="loginBox" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 p-6" style="display: flex;">
            <div class="glass-card w-full max-w-xs p-8 rounded-3xl space-y-4 text-center">
                <i data-lucide="lock" class="mx-auto text-indigo-400 w-12 h-12"></i>
                <h3 class="text-lg font-bold">สิทธิ์เฉพาะผู้ดูแล</h3>
                <input id="loginUser" type="text" placeholder="ชื่อผู้ใช้" class="w-full bg-slate-800 rounded-xl p-3 outline-none">
                <input id="loginPass" type="password" placeholder="รหัสผ่าน" class="w-full bg-slate-800 rounded-xl p-3 outline-none">
                <button onclick="doLogin()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">เข้าสู่ระบบ</button>
            </div>
        </div>

        <!-- Camera Section -->
        <div class="space-y-4 text-center">
            <div id="status" class="text-indigo-400 font-medium h-6 text-sm">กำลังเตรียมระบบ AI...</div>
            <div class="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <div id="capture-overlay" class="absolute inset-0 border-[12px] border-emerald-500 opacity-0 pointer-events-none"></div>
            </div>
            <div class="flex justify-center gap-2" id="step-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <!-- Form Section -->
        <div class="glass-card p-6 rounded-3xl space-y-4">
            <input id="studentId" type="text" placeholder="รหัสพนักงาน" class="w-full bg-slate-900 rounded-xl p-4 outline-none">
            <input id="username" type="text" placeholder="ชื่อ-นามสกุล" class="w-full bg-slate-900 rounded-xl p-4 outline-none">
            <input id="userDept" type="text" placeholder="แผนก" class="w-full bg-slate-900 rounded-xl p-4 outline-none">
            <button id="btnSave" disabled onclick="startScanningSequence()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold disabled:opacity-30">
                📸 เริ่มบันทึกใบหน้า 5 มุมมอง
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const video = document.getElementById("video");
        const statusDiv = document.getElementById("status");
        const btnSave = document.getElementById("btnSave");
        const dots = document.querySelectorAll(".dot");
        let descriptors = [];

        window.onload = () => {
            if (sessionStorage.getItem("isAdmin") === "true") {
                document.getElementById("loginBox").style.display = "none";
            }
            initAI();
        };

        function doLogin() {
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    sessionStorage.setItem("isAdmin", "true");
                    document.getElementById("loginBox").style.display = "none";
                } else {
                    alert("❌ รหัสผ่านไม่ถูกต้อง");
                }
            }).login({ user, pass });
        }

        async function initAI() {
            try {
                const MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmarks68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                statusDiv.innerText = "พร้อมลงทะเบียน";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                btnSave.disabled = false;
            } catch (e) {
                statusDiv.innerText = "❌ โหลด AI ไม่สำเร็จ";
            }
        }

        async function startScanningSequence() {
            const sid = document.getElementById("studentId").value;
            const name = document.getElementById("username").value;
            if(!sid || !name) return alert("กรอกข้อมูลให้ครบ");

            btnSave.disabled = true;
            descriptors = [];
            const steps = ["มองตรง", "หันซ้าย", "หันขวา", "เงยหน้า", "ก้มหน้า"];

            for (let i = 0; i < 5; i++) {
                dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
                statusDiv.innerText = `ขั้นตอนที่ ${i+1}: ${steps[i]}`;
                await new Promise(r => setTimeout(r, 2000));

                const detect = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                
                if (detect) {
                    descriptors.push(Array.from(detect.descriptor));
                    document.getElementById('capture-overlay').classList.add('flash-active');
                    setTimeout(() => document.getElementById('capture-overlay').classList.remove('flash-active'), 300);
                    dots[i].classList.add("done");
                } else {
                    statusDiv.innerText = "❌ ไม่พบใบหน้า ลองใหม่...";
                    i--;
                }
            }
            saveData(sid, name);
        }

        function saveData(sid, name) {
            statusDiv.innerText = "⏳ กำลังบันทึก...";
            const dept = document.getElementById("userDept").value;
            
            // ถ่ายรูปหน้าตรงไว้ 1 รูป
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 400;
            const ctx = canvas.getContext('2d');
            ctx.translate(400, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 400, 400);
            
            const payload = {
                id: sid,
                name: name,
                department: dept,
                image: canvas.toDataURL('image/jpeg', 0.7),
                descriptors: descriptors
            };

            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    statusDiv.innerText = "✅ ลงทะเบียนสำเร็จ!";
                    setTimeout(() => window.top.location.href = '<?= ScriptApp.getService().getUrl() ?>', 2000);
                } else {
                    alert("ล้มเหลว: " + res.message);
                    btnSave.disabled = false;
                }
            }).registerNewEmployee(payload);
        }
    </script>
</body>
</html>
